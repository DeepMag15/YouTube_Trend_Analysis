<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — TrendPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --red: #FF1F1F; --red-dark: #CC0000;
    --black: #0A0A0A; --dark: #111111;
    --card: #161616; --card2: #1C1C1C;
    --border: #252525; --text: #F0F0F0;
    --muted: #777; --gold: #FFD700;
    --green: #00C853; --blue: #2196F3;
    --sidebar: 260px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--black); color:var(--text);
    display:flex; height:100vh; overflow:hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--dark); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* ── SIDEBAR ── */
  .sidebar {
    width:var(--sidebar); background:var(--dark);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    flex-shrink:0; overflow-y:auto;
    position:relative; z-index:100;
  }
  .sidebar-logo {
    padding:24px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
    text-decoration:none;
  }
  .logo-dot { width:10px; height:10px; background:var(--red); border-radius:50%; animation:pulse-dot 1.5s infinite; }
  @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:.7;} }
  .logo-text { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--text); }
  .logo-text span { color:var(--red); }

  .sidebar-section { padding:20px 16px 8px; }
  .sidebar-section-label {
    font-family:'Space Mono',monospace; font-size:10px;
    letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:8px;
    color:var(--muted); font-size:14px; font-weight:500;
    cursor:pointer; transition:all .2s; margin-bottom:2px;
    border:none; background:none; width:100%; text-align:left;
    text-decoration:none;
  }
  .nav-item:hover { background:var(--card2); color:var(--text); }
  .nav-item.active { background:rgba(255,31,31,.1); color:var(--text); }
  .nav-item .icon { width:18px; text-align:center; font-size:16px; }
  .nav-badge {
    margin-left:auto; background:var(--red); color:white;
    font-size:10px; font-weight:700; padding:2px 7px;
    border-radius:100px; font-family:'Space Mono',monospace;
  }

  .sidebar-user {
    margin-top:auto; padding:16px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .user-avatar {
    width:36px; height:36px; background:var(--red);
    border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-email { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .logout-btn {
    background:none; border:none; color:var(--muted);
    cursor:pointer; padding:4px; border-radius:4px; transition:color .2s;
    font-size:16px;
  }
  .logout-btn:hover { color:var(--red); }

  /* ── MAIN CONTENT ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* TOP BAR */
  .topbar {
    padding:16px 28px; background:var(--dark);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px; flex-shrink:0;
  }
  .topbar-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; flex:1; }
  .region-select, .category-select, .time-select {
    background:var(--card); border:1px solid var(--border);
    color:var(--text); padding:8px 14px; border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer;
    outline:none; transition:border-color .2s; min-width:130px;
  }
  .region-select:focus, .category-select:focus, .time-select:focus { border-color:var(--red); }
  .refresh-btn {
    background:var(--red); border:none; color:white;
    padding:8px 16px; border-radius:8px; cursor:pointer;
    font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; gap:6px; transition:all .2s;
  }
  .refresh-btn:hover { background:var(--red-dark); }
  .refresh-btn.loading { opacity:.7; pointer-events:none; }

  /* CONTENT AREA */
  .content { flex:1; overflow-y:auto; padding:24px 28px; }

  /* STATS ROW */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:20px 22px;
    position:relative; overflow:hidden;
  }
  .stat-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  }
  .stat-card.red::after { background:var(--red); }
  .stat-card.gold::after { background:var(--gold); }
  .stat-card.green::after { background:var(--green); }
  .stat-card.blue::after { background:var(--blue); }
  .stat-icon { font-size:24px; margin-bottom:12px; }
  .stat-value {
    font-family:'Bebas Neue',sans-serif; font-size:32px;
    letter-spacing:1px; line-height:1;
  }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }
  .stat-change { font-size:11px; color:var(--green); margin-top:6px; }

  /* GRID LAYOUT */
  .grid-two { display:grid; grid-template-columns:1fr 400px; gap:20px; margin-bottom:24px; }
  .grid-full { margin-bottom:24px; }

  /* PANEL */
  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .panel-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title {
    font-family:'Bebas Neue',sans-serif; font-size:18px;
    letter-spacing:1.5px; display:flex; align-items:center; gap:8px;
  }
  .panel-body { padding:20px; }

  /* CHART */
  .chart-container { height:280px; position:relative; }

  /* VIDEO GRID */
  .videos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .video-card {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    transition:all .25s; cursor:pointer; position:relative;
  }
  .video-card:hover { border-color:var(--red); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .video-thumb {
    width:100%; aspect-ratio:16/9; object-fit:cover;
    background:var(--border); display:block; position:relative;
  }
  .video-thumb-wrap { position:relative; overflow:hidden; }
  .video-rank {
    position:absolute; top:10px; left:10px;
    background:rgba(0,0,0,.85); color:var(--text);
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
    padding:4px 10px; border-radius:6px;
  }
  .video-rank.top3 { background:var(--red); }
  .video-duration {
    position:absolute; bottom:8px; right:8px;
    background:rgba(0,0,0,.9); color:var(--text);
    font-size:11px; padding:3px 8px; border-radius:4px;
    font-family:'Space Mono',monospace;
  }
  .play-overlay {
    position:absolute; inset:0;
    background:rgba(255,31,31,.0);
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .video-card:hover .play-overlay { background:rgba(255,31,31,.15); }
  .play-btn {
    width:44px; height:44px; background:var(--red);
    border-radius:50%; display:flex; align-items:center;
    justify-content:center; opacity:0; transform:scale(.7);
    transition:all .25s;
  }
  .video-card:hover .play-btn { opacity:1; transform:scale(1); }
  .play-btn svg { width:16px; fill:white; margin-left:3px; }
  .video-info { padding:14px 16px; }
  .video-title {
    font-size:13px; font-weight:600; line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
    margin-bottom:8px;
  }
  .video-channel { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .video-meta { display:flex; gap:12px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
  .vm-item { display:flex; align-items:center; gap:4px; }
  .video-actions {
    padding:10px 16px; border-top:1px solid var(--border);
    display:flex; gap:8px;
  }
  .action-btn {
    flex:1; padding:7px; background:var(--card);
    border:1px solid var(--border); border-radius:6px;
    color:var(--muted); font-size:12px; cursor:pointer;
    transition:all .2s; font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .action-btn:hover { color:var(--text); border-color:var(--red); }
  .action-btn.watch { background:var(--red); border-color:var(--red); color:white; }
  .action-btn.watch:hover { background:var(--red-dark); }

  /* SHORTS GRID */
  .shorts-hero {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .short-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .short-card:hover {
    transform: translateY(-4px);
    border-color: var(--red);
    box-shadow: 0 8px 32px rgba(255,0,0,.15);
  }
  .short-thumb-wrap {
    position: relative;
    aspect-ratio: 9/16;
    overflow: hidden;
    background: #111;
    flex-shrink: 0;
  }
  .short-thumb {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .3s;
  }
  .short-card:hover .short-thumb { transform: scale(1.05); }
  .short-rank {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,.85);
    color: var(--muted);
    font-size: 11px; font-weight: 700;
    font-family: 'Space Mono', monospace;
    padding: 3px 8px; border-radius: 20px;
  }
  .short-rank.top3 { background: var(--red); color: white; }
  .short-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,0,0,.9);
    color: white; font-size: 10px; font-weight: 700;
    padding: 3px 7px; border-radius: 20px;
    font-family: 'Space Mono', monospace;
    letter-spacing: .5px;
  }
  .short-play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
    background: rgba(0,0,0,.4);
  }
  .short-card:hover .short-play-overlay { opacity: 1; }
  .short-play-btn {
    width: 48px; height: 48px;
    background: rgba(255,0,0,.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .short-play-btn svg { width: 18px; fill: white; margin-left: 4px; }
  .short-info { padding: 10px 12px; flex: 1; }
  .short-title {
    font-size: 12px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 6px;
  }
  .short-channel { font-size: 11px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .short-meta { display: flex; gap: 8px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .short-actions {
    padding: 8px 12px; border-top: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .short-actions .action-btn { font-size: 11px; padding: 5px 4px; }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex; align-items: center; gap: 14px;
    margin: 28px 0 18px;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
  .section-divider-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .channel-item {
    display:flex; align-items:center; gap:14px;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .channel-item:last-child { border-bottom:none; }
  .channel-rank {
    font-family:'Space Mono',monospace; font-size:14px;
    font-weight:700; color:var(--muted); width:24px; text-align:center;
  }
  .channel-rank.gold { color:var(--gold); }
  .channel-icon {
    width:40px; height:40px; border-radius:50%;
    background:var(--border); display:flex; align-items:center;
    justify-content:center; font-size:18px; flex-shrink:0;
  }
  .channel-info { flex:1; min-width:0; }
  .channel-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .channel-videos { font-size:11px; color:var(--muted); }
  .channel-views { font-size:12px; color:var(--red); font-family:'Space Mono',monospace; font-weight:700; }

  /* CATEGORY BREAKDOWN */
  .cat-breakdown { display:flex; flex-direction:column; gap:10px; }
  .cat-bar-item { }
  .cat-bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
  .cat-bar-label span:first-child { color:var(--muted); }
  .cat-bar-label span:last-child { color:var(--text); font-family:'Space Mono',monospace; }
  .cat-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .cat-bar-fill { height:100%; background:var(--red); border-radius:3px; transition:width 1s ease; }

  /* LOADING STATE */
  .loading-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .skeleton {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; animation:shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%,100% { opacity:.6; } 50% { opacity:1; }
  }
  .skel-thumb { aspect-ratio:16/9; background:var(--border); }
  .skel-body { padding:14px 16px; }
  .skel-line { height:10px; background:var(--border); border-radius:4px; margin-bottom:8px; }
  .skel-line.short { width:60%; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; }
  .empty-state .icon { font-size:48px; margin-bottom:16px; opacity:.4; }
  .empty-state h3 { font-size:18px; color:var(--muted); margin-bottom:8px; }
  .empty-state p { font-size:14px; color:var(--muted); opacity:.6; }

  /* API CONFIG BANNER */
  .api-banner {
    background:rgba(255,183,0,.08); border:1px solid rgba(255,183,0,.2);
    border-radius:10px; padding:14px 18px; margin-bottom:20px;
    display:flex; align-items:center; gap:12px; font-size:13px;
  }
  .api-banner a { color:#FFD700; text-decoration:none; }
  .api-banner-close { margin-left:auto; cursor:pointer; color:var(--muted); background:none; border:none; font-size:16px; }

  /* TOAST */
  .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:var(--card2); border:1px solid var(--border);
    border-radius:8px; padding:12px 18px; font-size:13px;
    display:flex; align-items:center; gap:10px;
    transform:translateX(120%); transition:transform .3s;
    min-width:260px; max-width:360px;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { transform:translateX(0); }
  .toast.success { border-left:3px solid var(--green); }
  .toast.error { border-left:3px solid var(--red); }
  .toast.info { border-left:3px solid var(--blue); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }
  .modal {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:32px; width:90%; max-width:500px;
    transform:translateY(16px); transition:transform .3s;
  }
  .modal-overlay.active .modal { transform:translateY(0); }
  .modal-close {
    float:right; background:none; border:1px solid var(--border);
    color:var(--muted); width:30px; height:30px; border-radius:50%;
    cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { color:var(--text); }

  /* RESPONSIVE */
  @media(max-width:1100px) { .grid-two { grid-template-columns:1fr; } }
  @media(max-width:900px) {
    .sidebar { display:none; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .content { padding:16px; }
    .topbar { padding:12px 16px; flex-wrap:wrap; }
  }
  @media(max-width:500px) {
    .stats-row { grid-template-columns:1fr; }
    .videos-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-dot"></div>
    <div class="logo-text">TREND<span>PULSE</span></div>
  </a>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Main</div>
    <button class="nav-item active" onclick="switchView('trending')">
      <span class="icon">🔥</span> Trending Videos
      <span class="nav-badge" id="trendingCount">–</span>
    </button>
    <button class="nav-item" onclick="switchView('shorts')">
      <span class="icon">📱</span> Trending Shorts
      <span class="nav-badge" id="shortsCount">–</span>
    </button>
    <button class="nav-item" onclick="switchView('charts')">
      <span class="icon">📊</span> Trend Charts
    </button>
    <button class="nav-item" onclick="switchView('channels')">
      <span class="icon">📺</span> Top Channels
    </button>
    <button class="nav-item" onclick="switchView('bookmarks')">
      <span class="icon">🔖</span> Bookmarks
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Categories</div>
    <button class="nav-item" onclick="filterCategory('')">
      <span class="icon">🌐</span> All Categories
    </button>
    <button class="nav-item" onclick="filterCategory(17)">
      <span class="icon">⚽</span> Sports
    </button>
    <button class="nav-item" onclick="filterCategory(10)">
      <span class="icon">🎵</span> Music
    </button>
    <button class="nav-item" onclick="filterCategory(20)">
      <span class="icon">🎮</span> Gaming
    </button>
    <button class="nav-item" onclick="filterCategory(28)">
      <span class="icon">🔬</span> Science & Tech
    </button>
    <button class="nav-item" onclick="filterCategory(24)">
      <span class="icon">🎭</span> Entertainment
    </button>
    <button class="nav-item" onclick="filterCategory(25)">
      <span class="icon">📰</span> News & Politics
    </button>
    <button class="nav-item" onclick="filterCategory(27)">
      <span class="icon">📚</span> Education
    </button>
    <button class="nav-item" onclick="filterCategory(22)">
      <span class="icon">👤</span> People & Blogs
    </button>
    <button class="nav-item" onclick="filterCategory(23)">
      <span class="icon">😂</span> Comedy
    </button>
  </div>

  <div id="adminSidebarSection"></div>

  <div class="sidebar-user" id="sidebarUser">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail">–</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Logout">↩</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">🔥 TRENDING NOW</div>
    <select class="region-select" id="regionSelect" onchange="onRegionChange()">
      <option value="US">🇺🇸 United States</option>
    </select>
    <select class="category-select" id="categorySelect" onchange="onCategoryChange()">
      <option value="">All Categories</option>
    </select>
    <select class="time-select" id="timeSelect" onchange="renderCharts()">
      <option value="7">Last 7 Days</option>
      <option value="30" selected>Last 1 Month</option>
      <option value="90">Last 3 Months</option>
      <option value="365">Last 1 Year</option>
    </select>
    <button class="refresh-btn" id="refreshBtn" onclick="loadTrending(true)">
      <span id="refreshIcon">↺</span> Refresh
    </button>
    <div id="callsBadge" style="font-size:11px;font-family:'Space Mono',monospace;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);white-space:nowrap;">Tap refresh to load</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent">
    <!-- Filled by JS -->

function getUserCallsDb() {
  const db = JSON.parse(localStorage.getItem('tp_users_db') || '{}');

  return { db, email: user.email, user };
}

function getTodayCalls() {
  const { db, email } = getUserCallsDb();
  const today = new Date().toDateString();
  return (db[email]?.calls?.[today]) || 0;
}

function incrementCall() {
  const { db, email } = getUserCallsDb();
  const today = new Date().toDateString();
  if (!db[email]) db[email] = { calls: {} };
  if (!db[email].calls) db[email].calls = {};
  db[email].calls[today] = (db[email].calls[today] || 0) + 1;
  localStorage.setItem('tp_users_db', JSON.stringify(db));
}

function checkRateLimit(showWarning = true) {
  const calls = getTodayCalls();

function startCountdown() {
  function tick() {
    const now = new Date();
    const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    const el = document.getElementById('countdownTimer');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════
// API KEY ROTATION
// ═══════════════════════════════════════════════
async function fetchWithKeyRotation(url) {
  const keys = STATE.apiKeys;
  if (!keys || keys.length === 0) throw new Error('Service unavailable');

  let lastErr = 'Unknown';

  for (let attempt = 0; attempt < keys.length; attempt++) {
    const keyIndex = (STATE.currentKeyIndex + attempt) % keys.length;
    const key      = keys[keyIndex];

    // Build full URL — key goes last, raw (no encode needed for AIza... keys)
    const fullUrl = url + '&key=' + key;

    let resp, data;
    try {
      resp = await fetch(fullUrl, { method: 'GET' });
    } catch (netErr) {
      // CORS / network failure
      console.error('[TP] Network error on attempt', attempt, netErr.message);
      lastErr = 'Network error: ' + netErr.message;
      continue;
    }

    try {
      data = await resp.json();
    } catch (parseErr) {
      console.error('[TP] JSON parse error', resp.status, parseErr.message);
      lastErr = 'Bad response';
      continue;
    }

    // Log the raw response for debugging
    if (data.error) {
      console.warn('[TP] API error', data.error.code, data.error.status, data.error.message);
    } else {
      console.log('[TP] Success — items:', data.items?.length, 'url:', fullUrl.substring(0, 100));
    }

    if (data.error) {
      const code   = data.error.code;
      const status = (data.error.status  || '').toUpperCase();
      const msg    = (data.error.message || '').toLowerCase();

      // Quota / rate-limit / forbidden → rotate key silently
      if (code === 403 || code === 429 ||
          status === 'RESOURCE_EXHAUSTED' || status === 'FORBIDDEN' ||
          msg.includes('quota') || msg.includes('forbidden') || msg.includes('rate limit') ||
          msg.includes('referer') || msg.includes('referrer') || msg.includes('ip address')) {
        STATE.currentKeyIndex = (keyIndex + 1) % keys.length;
        lastErr = data.error.message || 'quota'; // preserve real message
        continue;
      }

      // Bad key / bad request → skip this key and try next
      if (code === 400 || code === 401) {
        console.warn('[TP] Bad key or request, skipping key', keyIndex);
        lastErr = msg || `HTTP ${code}`;
        continue;
      }

      // Anything else (404, 5xx, etc.) — log and skip
      lastErr = msg || `HTTP ${code}`;
      console.warn('[TP] Skipping due to error:', lastErr);
      continue;
    }

    // ✅ Successful response
    STATE.currentKeyIndex = keyIndex;
    return data;
  }

  throw new Error(lastErr || 'All API keys failed');
}

const FETCH_CATS = [
  { id: '',   name: 'Overall Trending', icon: '🔥' },
  { id: '17', name: 'Sports',           icon: '⚽' },
  { id: '10', name: 'Music',            icon: '🎵' },

async function loadTrending() {
  if (STATE.loading) return;

  checkApiKeys();

  if (!STATE.apiKeys.length) {
    showToast('No API key configured — go to Admin Panel to add one.', 'error');
    return;
  }

  if (!checkRateLimit(true)) return;

  STATE.loading = true;
  const btn = document.getElementById('refreshBtn');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('loading');
    document.getElementById('refreshIcon').textContent = '⟳';
  }

  showFetchingState();

  // ── PRE-FLIGHT: one quick test call to catch the exact error before looping 15 cats ──
  try {
    const testKey = STATE.apiKeys[0];
    const testUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=1&hl=en&key=${testKey}`;
    const testResp = await fetch(testUrl);
    const testData = await testResp.json();

    if (testData.error) {
      const code = testData.error.code;
      const msg  = testData.error.message || '';
      const status = (testData.error.status || '').toUpperCase();

      let friendlyMsg = '';
      if (code === 403 && msg.toLowerCase().includes('referer')) {
        friendlyMsg = `Blocked: add ${location.origin} to your API key's allowed referrers in Google Cloud Console.`;
      } else if (code === 403 && (msg.toLowerCase().includes('not been used') || msg.toLowerCase().includes('disabled') || msg.toLowerCase().includes('enable'))) {
        friendlyMsg = 'YouTube Data API v3 is not enabled. Go to Google Cloud Console → APIs & Services → Enable YouTube Data API v3.';
      } else if (code === 403 || status === 'FORBIDDEN') {
        friendlyMsg = `API key forbidden (403). Check key restrictions in Google Cloud Console. Detail: ${msg}`;
      } else if (code === 400) {
        friendlyMsg = `Invalid API key (400). Re-check the key in Admin Panel. Detail: ${msg}`;
      } else if (code === 429 || status === 'RESOURCE_EXHAUSTED') {
        friendlyMsg = 'API quota exhausted for today. Resets at midnight Pacific Time.';
      } else {
        friendlyMsg = `YouTube API error ${code}: ${msg}`;
      }

      // Show real error, decrement call count since we didn't actually fetch
      showToast(friendlyMsg, 'error');
      console.error('[TrendPulse] Pre-flight failed:', code, msg);
      STATE.loading = false;
      if (btn) {
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('refreshIcon').textContent = '↺';
      }
      // Restore the rate-limit call we haven't incremented yet
      const content = document.getElementById('mainContent');
      if (content) content.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;text-align:center;padding:40px 20px;">
          <div style="font-size:48px;">⚠️</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--red);">COULD NOT LOAD DATA</div>
          <div style="font-size:13px;color:#888;max-width:480px;line-height:1.8;background:#1a1a1a;padding:16px 20px;border-radius:10px;border:1px solid #2a2a2a;text-align:left;">
            <strong style="color:var(--text);">Error:</strong> ${friendlyMsg}
          </div>
          <button onclick="loadTrending()" style="padding:10px 28px;background:var(--red);border:none;color:white;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">
            ↺ Try Again
          </button>
        </div>`;
      checkRateLimit(false);
      return;
    }
  } catch (preflightNetErr) {
    showToast('Cannot reach YouTube API — check your internet connection.', 'error');
    console.error('[TrendPulse] Network error:', preflightNetErr.message);
    STATE.loading = false;
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('refreshIcon').textContent = '↺';
    }
    checkRateLimit(false);
    return;
  }

  // Pre-flight passed — now fetch all 15 categories
  let fetchedAny = false;
  let firstCatError = '';

  try {
    incrementCall();
    updateCallsBadge(getTodayCalls());

    STATE.categoryCache = {};

    for (const cat of FETCH_CATS) {
      try {
        const params = new URLSearchParams({
          part:       'snippet,statistics,contentDetails',
          chart:      'mostPopular',
          regionCode: STATE.region,
          maxResults: String(TOP_PER_CATEGORY),
          hl:         'en',
        });
        if (cat.id) params.set('videoCategoryId', cat.id);

        const url  = `https://www.googleapis.com/youtube/v3/videos?${params.toString()}`;
        const data = await fetchWithKeyRotation(url);

        if (data && Array.isArray(data.items) && data.items.length > 0) {
          STATE.categoryCache[cat.id] = data.items.map((item, i) => mapVideo(item, i));
          fetchedAny = true;
        } else {
          STATE.categoryCache[cat.id] = [];
        }
      } catch (catErr) {
        STATE.categoryCache[cat.id] = [];
        if (!firstCatError) firstCatError = catErr.message;
        console.warn(`[TrendPulse] "${cat.name}" failed:`, catErr.message);
      }
    }

    // Flatten & split into regular videos and Shorts (≤60s)
    const seen = new Set();
    STATE.videos = [];
    STATE.shorts = [];
    for (const vids of Object.values(STATE.categoryCache)) {
      for (const v of vids) {
        if (!seen.has(v.id)) {
          seen.add(v.id);
          if ((v.durationSec || 0) <= SHORTS_MAX_SEC && v.durationSec > 0) {
            STATE.shorts.push(v);
          } else {
            STATE.videos.push(v);
          }
        }
      }
    }
    // Sort both by views descending, re-rank
    STATE.videos.sort((a,b) => b.views - a.views).forEach((v,i) => v.rank = i+1);
    STATE.shorts.sort((a,b) => b.views - a.views).forEach((v,i) => v.rank = i+1);

    document.getElementById('trendingCount').textContent =
      STATE.videos.length + STATE.shorts.length || 0;

    if (fetchedAny) {
      const regionObj = REGIONS.find(r => r.code === STATE.region);
      showToast(`✓ Trending loaded for ${regionObj?.flag || ''} ${regionObj?.name || STATE.region}`, 'success');
    } else {
      showToast(firstCatError || 'Could not load videos. Please try again.', 'error');
    }

    renderView();

  } catch (err) {
    showToast(err.message || 'Could not load videos. Please try again.', 'error');
    console.error('[TrendPulse] loadTrending error:', err);
    renderView();
  } finally {
    STATE.loading = false;
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('refreshIcon').textContent = '↺';
    }
    checkRateLimit(false);
  }
}

function mapVideo(item, i) {
  const sn   = item.snippet       || {};
  const st   = item.statistics    || {};
  const cd   = item.contentDetails|| {};
  const tn   = sn.thumbnails      || {};

  // Pick highest-quality thumbnail available
  const thumb = (tn.maxres || tn.standard || tn.high || tn.medium || tn.default || {}).url || '';

  return {
    id:          item.id,
    title:       sn.title        || '(no title)',
    channel:     sn.channelTitle || '',
    channelId:   sn.channelId    || '',
    thumbnail:   thumb,
    views:       parseInt(st.viewCount    || 0),
    likes:       parseInt(st.likeCount    || 0),
    comments:    parseInt(st.commentCount || 0),
    duration:    formatDuration(cd.duration),
    durationSec: parseDurationSec(cd.duration),
    categoryId:  sn.categoryId   || '',
    publishedAt: sn.publishedAt  || '',
    url:         `https://www.youtube.com/watch?v=${item.id}`,
    rank:        i + 1,
  };
}

function formatDuration(iso) {
  if (!iso) return '0:00';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  const h = parseInt(m?.[1]||0), min = parseInt(m?.[2]||0), s = parseInt(m?.[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function parseDurationSec(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  return parseInt(m?.[1]||0)*3600 + parseInt(m?.[2]||0)*60 + parseInt(m?.[3]||0);
}

function durationLabel(sec) {
  // Returns human label based on seconds
  if (sec < 60)    return '< 1 min';
  if (sec < 300)   return '1–5 min';
  if (sec < 600)   return '5–10 min';
  if (sec < 1200)  return '10–20 min';
  if (sec < 3600)  return '20–60 min';
  return '1 hr+';
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function timeSince(dateStr) {
  const sec = Math.floor((new Date() - new Date(dateStr)) / 1000);
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  return `${Math.floor(sec/86400)}d ago`;
}

// ═══════════════════════════════════════════════
// FILTERED VIDEO POOL — used by Charts & Channels
// ═══════════════════════════════════════════════
function getFilteredVideos() {
  // duration type: 'videos' = long only, 'shorts' = shorts only, 'all' = both
  const durType = document.getElementById('chartDurFilter')?.value || 'videos';
  const catId   = document.getElementById('chartCatFilter')?.value || '';

  // Pick the right pool
  let pool = [];
  if (durType === 'videos')  pool = [...STATE.videos];
  else if (durType === 'shorts') pool = [...STATE.shorts];
  else pool = [...STATE.videos, ...STATE.shorts];

  // Filter by category if selected
  if (catId !== '') {
    pool = pool.filter(v => String(v.categoryId) === String(catId));
  }

  return pool;
}

function buildChartFilterBar(activeDur = 'videos', activeCat = '') {
  const catOptions = CATEGORIES.map(c =>
    `<option value="${c.id}" ${String(activeCat)===String(c.id)?'selected':''}>${c.icon} ${c.name}</option>`
  ).join('');

  return `
    <div style="display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--dark);border-bottom:1px solid var(--border);flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:.5px;flex-shrink:0;">FILTER:</span>

      <select id="chartCatFilter" onchange="onChartFilterChange()"
        style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">
        ${catOptions}
      </select>

      <div style="display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0;">
        ${[['videos','🎬 Videos'],['shorts','📱 Shorts'],['all','🔀 Both']].map(([val,label]) => `
          <button onclick="setChartDurFilter('${val}')" id="durBtn_${val}"
            style="padding:6px 14px;border:none;background:${activeDur===val?'var(--red)':'var(--card)'};color:${activeDur===val?'white':'var(--muted)'};font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;">
            ${label}
          </button>`).join('')}
      </div>

      <span id="chartPoolSize" style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-left:auto;">
        — videos in view
      </span>
    </div>`;
}

function setChartDurFilter(val) {
  const btn = document.getElementById('durBtn_' + val);
  if (!btn) return;
  // Update button styles
  ['videos','shorts','all'].forEach(v => {
    const b = document.getElementById('durBtn_' + v);
    if (!b) return;
    b.style.background = v === val ? 'var(--red)' : 'var(--card)';
    b.style.color       = v === val ? 'white' : 'var(--muted)';
  });
  // Store in a hidden input so getFilteredVideos can read it
  let inp = document.getElementById('chartDurFilter');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'hidden';
    inp.id   = 'chartDurFilter';
    document.body.appendChild(inp);
  }
  inp.value = val;
  onChartFilterChange();
}

function onChartFilterChange() {
  updateChartPoolSize();
  if (STATE.currentView === 'charts') {
    initTrendChart();
    initCatChart();
    renderCatBreakdown();
  } else if (STATE.currentView === 'channels') {
    renderChannelContent();
  }
}

function updateChartPoolSize() {
  const pool = getFilteredVideos();
  const el = document.getElementById('chartPoolSize');
  if (el) el.textContent = `${pool.length} video${pool.length!==1?'s':''} in view`;
}

function initTrendChart() {
  const ctx = document.getElementById('trendChart')?.getContext('2d');
  if (!ctx) return;
  if (STATE.chartInstance) { STATE.chartInstance.destroy(); STATE.chartInstance = null; }

  const pool = getFilteredVideos();
  const days = parseInt(document.getElementById('chartTimeRange')?.value || 30);
  const now  = new Date();

  const buckets = {};
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now - i * 86400000);
    buckets[d.toDateString()] = 0;
  }
  pool.forEach(v => {
    if (!v.publishedAt) return;
    const key = new Date(v.publishedAt).toDateString();
    if (key in buckets) buckets[key] += v.views;
  });

  const labels = Object.keys(buckets).map(k => {
    const d = new Date(k);
    return days <= 7
      ? d.toLocaleDateString('en', { weekday: 'short' })
      : d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  });

  const durType = document.getElementById('chartDurFilter')?.value || 'videos';
  const lineColor = durType === 'shorts' ? '#F97316' : durType === 'all' ? '#A855F7' : '#FF1F1F';

  STATE.chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Views (by publish date)',
        data: Object.values(buckets),
        borderColor: lineColor,
        backgroundColor: lineColor + '14',
        borderWidth: 2, fill: true, tension: 0.4,
        pointRadius: days <= 7 ? 4 : 2,
        pointHoverRadius: 6,
        pointBackgroundColor: lineColor,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1C1C1C', borderColor: '#252525', borderWidth: 1,
          titleColor: '#F0F0F0', bodyColor: '#777',
          callbacks: { label: c => ' ' + formatNum(c.raw) + ' views' }
        }
      },
      scales: {
        x: { grid: { color: '#1E1E1E' }, ticks: { color: '#555', maxTicksLimit: 8 } },
        y: { grid: { color: '#1E1E1E' }, ticks: { color: '#555', callback: v => formatNum(v) } }
      }
    }
  });
}

function updateMainChart() { initTrendChart(); }

function initCatChart() {
  const ctx = document.getElementById('catChart')?.getContext('2d');
  if (!ctx) return;
  if (STATE.catChartInstance) { STATE.catChartInstance.destroy(); STATE.catChartInstance = null; }

  const pool = getFilteredVideos();
  const catCounts = {};
  pool.forEach(v => {
    const cat = CATEGORIES.find(c => String(c.id) === String(v.categoryId))?.name || 'Other';
    catCounts[cat] = (catCounts[cat] || 0) + 1;
  });

  const sorted = Object.entries(catCounts).sort((a,b) => b[1]-a[1]).slice(0, 8);
  if (!sorted.length) return;
  const colors = ['#FF1F1F','#FF6B35','#FFD700','#00C853','#2196F3','#9C27B0','#FF9800','#00BCD4'];

  STATE.catChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([k]) => k),
      datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: colors, borderWidth: 0, hoverBorderWidth: 2, hoverBorderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#777', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1C1C1C', borderColor: '#252525', borderWidth: 1,
          titleColor: '#F0F0F0', bodyColor: '#777'
        }
      },
      cutout: '65%'
    }
  });
}

function renderCatBreakdown() {
  const el = document.getElementById('catBreakdown');
  if (!el) return;

  const pool = getFilteredVideos();
  const catData = {};
  pool.forEach(v => {
    const cat  = CATEGORIES.find(c => String(c.id) === String(v.categoryId));
    const name = cat?.name || 'Other';
    if (!catData[name]) catData[name] = { views: 0, likes: 0, count: 0 };
    catData[name].views += v.views;
    catData[name].likes += v.likes;
    catData[name].count++;
  });

  const sorted  = Object.entries(catData).sort((a,b) => b[1].views - a[1].views);
  const maxViews = sorted[0]?.[1].views || 1;

  if (!sorted.length) {
    el.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">No data for the selected filters.</div>`;
    return;
  }

  el.innerHTML = sorted.slice(0, 12).map(([name, d]) => `
    <div class="cat-bar-item">
      <div class="cat-bar-label">
        <span>${name} <span style="color:#444;font-size:10px;">(${d.count} video${d.count!==1?'s':''})</span></span>
        <span>${formatNum(d.views)}</span>
      </div>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${(d.views/maxViews*100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
}

function renderChannelContent() {

  const channelMap = {};
  pool.forEach(v => {
    if (!channelMap[v.channel]) channelMap[v.channel] = { name: v.channel, videos: 0, views: 0, likes: 0, shorts: 0 };
    channelMap[v.channel].views += v.views;
    channelMap[v.channel].likes += v.likes;

    else channelMap[v.channel].videos++;

                </div>

        scales: {
          x: { grid: { color: '#1E1E1E' }, ticks: { color: '#555', callback: v => formatNum(v) } },
          y: { grid: { color: '#1E1E1E' }, ticks: { color: '#888', font: { size: 11 } } }
        }
      }
    });
  }, 50);
}

// ─── BOOKMARKS VIEW ───
function renderBookmarks() {
  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="panel grid-full">
      <div class="panel-header">
        <div class="panel-title">🔖 SAVED VIDEOS</div>
        <span style="font-size:12px;color:var(--muted)">${STATE.bookmarks.length} saved</span>
      </div>
      <div class="panel-body">
        ${STATE.bookmarks.length === 0
          ? `<div class="empty-state"><div class="icon">🔖</div><h3>No bookmarks yet</h3><p>Save videos from Trending to find them here</p></div>`
          : `<div class="videos-grid">${renderVideoCards(STATE.bookmarks)}</div>`
        }
      </div>
    </div>
  `;
  if (banner) content.prepend(banner);
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function watchVideo(url) {
  window.open(url, '_blank', 'noopener');
}

function openVideoModal(video) {
  const modal = document.getElementById('videoModal');
  const content = document.getElementById('videoModalContent');
  const isBookmarked = STATE.bookmarks.some(b => b.id === video.id);
  const cat = CATEGORIES.find(c => String(c.id) === String(video.categoryId));

  content.innerHTML = `
    <div style="margin-bottom:16px;">
      <img src="${video.thumbnail}" style="width:100%;border-radius:8px;aspect-ratio:16/9;object-fit:cover;background:var(--border);" onerror="this.style.background='#1a1a1a'">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="background:var(--red);color:white;font-size:10px;font-family:'Space Mono',monospace;padding:3px 10px;border-radius:4px;">#${video.rank} TRENDING</span>
      ${cat ? `<span style="background:var(--border);font-size:10px;padding:3px 10px;border-radius:4px;color:var(--muted);">${cat.icon} ${cat.name}</span>` : ''}
      <span style="font-size:11px;color:var(--muted);margin-left:auto;">${video.duration}</span>
    </div>
    <h3 style="font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.4;">${escHtml(video.title)}</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">📺 ${escHtml(video.channel)} · ${timeSince(video.publishedAt)}</div>
    <div style="display:flex;gap:16px;margin-bottom:16px;">
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);">${formatNum(video.views)}</div><div style="font-size:11px;color:var(--muted);">Views</div></div>
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;">${formatNum(video.likes)}</div><div style="font-size:11px;color:var(--muted);">Likes</div></div>
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;">${formatNum(video.comments)}</div><div style="font-size:11px;color:var(--muted);">Comments</div></div>
    </div>
    ${video.description ? `<p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;">${escHtml(video.description)}...</p>` : ''}
    <div style="display:flex;gap:10px;">
      <button onclick="watchVideo('${video.url}')" style="flex:2;padding:12px;background:var(--red);border:none;color:white;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">▶ Watch on YouTube</button>
      <button onclick="toggleBookmark(${JSON.stringify(video).replace(/"/g,'&quot;')});document.getElementById('videoModal').classList.remove('active')" style="flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;">${isBookmarked?'🔖 Saved':'🔖 Save'}</button>
    </div>
  `;
  modal.classList.add('active');
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('active');
}

function toggleBookmark(video) {
  const idx = STATE.bookmarks.findIndex(b => b.id === video.id);
  if (idx > -1) {
    STATE.bookmarks.splice(idx, 1);
    showToast('Removed from bookmarks', 'info');
  } else {
    STATE.bookmarks.push(video);
    showToast('Saved to bookmarks!', 'success');
  }
  localStorage.setItem('tp_bookmarks', JSON.stringify(STATE.bookmarks));
}

function shareVideo(url, title) {
  if (navigator.share) {
    navigator.share({ title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url);
    showToast('Link copied to clipboard!', 'success');
  }
}

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]}</span>${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

function logout() {
  localStorage.removeItem('tp_token');
  localStorage.removeItem('tp_user');
  window.location.href = 'index.html';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeVideoModal();
  }
});
</script>
</body>
</html>
