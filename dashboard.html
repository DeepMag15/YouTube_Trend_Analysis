<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — TrendPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --red: #FF1F1F; --red-dark: #CC0000;
    --black: #0A0A0A; --dark: #111111;
    --card: #161616; --card2: #1C1C1C;
    --border: #252525; --text: #F0F0F0;
    --muted: #777; --gold: #FFD700;
    --green: #00C853; --blue: #2196F3;
    --sidebar: 260px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--black); color:var(--text);
    display:flex; height:100vh; overflow:hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--dark); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* ── SIDEBAR ── */
  .sidebar {
    width:var(--sidebar); background:var(--dark);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    flex-shrink:0; overflow-y:auto;
    position:relative; z-index:100;
  }
  .sidebar-logo {
    padding:24px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
    text-decoration:none;
  }
  .logo-dot { width:10px; height:10px; background:var(--red); border-radius:50%; animation:pulse-dot 1.5s infinite; }
  @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:.7;} }
  .logo-text { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--text); }
  .logo-text span { color:var(--red); }

  .sidebar-section { padding:20px 16px 8px; }
  .sidebar-section-label {
    font-family:'Space Mono',monospace; font-size:10px;
    letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:8px;
    color:var(--muted); font-size:14px; font-weight:500;
    cursor:pointer; transition:all .2s; margin-bottom:2px;
    border:none; background:none; width:100%; text-align:left;
    text-decoration:none;
  }
  .nav-item:hover { background:var(--card2); color:var(--text); }
  .nav-item.active { background:rgba(255,31,31,.1); color:var(--text); }
  .nav-item .icon { width:18px; text-align:center; font-size:16px; }
  .nav-badge {
    margin-left:auto; background:var(--red); color:white;
    font-size:10px; font-weight:700; padding:2px 7px;
    border-radius:100px; font-family:'Space Mono',monospace;
  }

  .sidebar-user {
    margin-top:auto; padding:16px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .user-avatar {
    width:36px; height:36px; background:var(--red);
    border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-email { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .logout-btn {
    background:none; border:none; color:var(--muted);
    cursor:pointer; padding:4px; border-radius:4px; transition:color .2s;
    font-size:16px;
  }
  .logout-btn:hover { color:var(--red); }

  /* ── MAIN CONTENT ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* TOP BAR */
  .topbar {
    padding:16px 28px; background:var(--dark);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px; flex-shrink:0;
  }
  .topbar-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; flex:1; }
  .region-select, .category-select, .time-select {
    background:var(--card); border:1px solid var(--border);
    color:var(--text); padding:8px 14px; border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer;
    outline:none; transition:border-color .2s; min-width:130px;
  }
  .region-select:focus, .category-select:focus, .time-select:focus { border-color:var(--red); }
  .refresh-btn {
    background:var(--red); border:none; color:white;
    padding:8px 16px; border-radius:8px; cursor:pointer;
    font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; gap:6px; transition:all .2s;
  }
  .refresh-btn:hover { background:var(--red-dark); }
  .refresh-btn.loading { opacity:.7; pointer-events:none; }

  /* CONTENT AREA */
  .content { flex:1; overflow-y:auto; padding:24px 28px; }

  /* STATS ROW */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:20px 22px;
    position:relative; overflow:hidden;
  }
  .stat-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  }
  .stat-card.red::after { background:var(--red); }
  .stat-card.gold::after { background:var(--gold); }
  .stat-card.green::after { background:var(--green); }
  .stat-card.blue::after { background:var(--blue); }
  .stat-icon { font-size:24px; margin-bottom:12px; }
  .stat-value {
    font-family:'Bebas Neue',sans-serif; font-size:32px;
    letter-spacing:1px; line-height:1;
  }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }
  .stat-change { font-size:11px; color:var(--green); margin-top:6px; }

  /* GRID LAYOUT */
  .grid-two { display:grid; grid-template-columns:1fr 400px; gap:20px; margin-bottom:24px; }
  .grid-full { margin-bottom:24px; }

  /* PANEL */
  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .panel-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title {
    font-family:'Bebas Neue',sans-serif; font-size:18px;
    letter-spacing:1.5px; display:flex; align-items:center; gap:8px;
  }
  .panel-body { padding:20px; }

  /* CHART */
  .chart-container { height:280px; position:relative; }

  /* VIDEO GRID */
  .videos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .video-card {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    transition:all .25s; cursor:pointer; position:relative;
  }
  .video-card:hover { border-color:var(--red); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .video-thumb {
    width:100%; aspect-ratio:16/9; object-fit:cover;
    background:var(--border); display:block; position:relative;
  }
  .video-thumb-wrap { position:relative; overflow:hidden; }
  .video-rank {
    position:absolute; top:10px; left:10px;
    background:rgba(0,0,0,.85); color:var(--text);
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
    padding:4px 10px; border-radius:6px;
  }
  .video-rank.top3 { background:var(--red); }
  .video-duration {
    position:absolute; bottom:8px; right:8px;
    background:rgba(0,0,0,.9); color:var(--text);
    font-size:11px; padding:3px 8px; border-radius:4px;
    font-family:'Space Mono',monospace;
  }
  .play-overlay {
    position:absolute; inset:0;
    background:rgba(255,31,31,.0);
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .video-card:hover .play-overlay { background:rgba(255,31,31,.15); }
  .play-btn {
    width:44px; height:44px; background:var(--red);
    border-radius:50%; display:flex; align-items:center;
    justify-content:center; opacity:0; transform:scale(.7);
    transition:all .25s;
  }
  .video-card:hover .play-btn { opacity:1; transform:scale(1); }
  .play-btn svg { width:16px; fill:white; margin-left:3px; }
  .video-info { padding:14px 16px; }
  .video-title {
    font-size:13px; font-weight:600; line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
    margin-bottom:8px;
  }
  .video-channel { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .video-meta { display:flex; gap:12px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
  .vm-item { display:flex; align-items:center; gap:4px; }
  .video-actions {
    padding:10px 16px; border-top:1px solid var(--border);
    display:flex; gap:8px;
  }
  .action-btn {
    flex:1; padding:7px; background:var(--card);
    border:1px solid var(--border); border-radius:6px;
    color:var(--muted); font-size:12px; cursor:pointer;
    transition:all .2s; font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .action-btn:hover { color:var(--text); border-color:var(--red); }
  .action-btn.watch { background:var(--red); border-color:var(--red); color:white; }
  .action-btn.watch:hover { background:var(--red-dark); }

  /* TOP CHANNELS */
  .channel-item {
    display:flex; align-items:center; gap:14px;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .channel-item:last-child { border-bottom:none; }
  .channel-rank {
    font-family:'Space Mono',monospace; font-size:14px;
    font-weight:700; color:var(--muted); width:24px; text-align:center;
  }
  .channel-rank.gold { color:var(--gold); }
  .channel-icon {
    width:40px; height:40px; border-radius:50%;
    background:var(--border); display:flex; align-items:center;
    justify-content:center; font-size:18px; flex-shrink:0;
  }
  .channel-info { flex:1; min-width:0; }
  .channel-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .channel-videos { font-size:11px; color:var(--muted); }
  .channel-views { font-size:12px; color:var(--red); font-family:'Space Mono',monospace; font-weight:700; }

  /* CATEGORY BREAKDOWN */
  .cat-breakdown { display:flex; flex-direction:column; gap:10px; }
  .cat-bar-item { }
  .cat-bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
  .cat-bar-label span:first-child { color:var(--muted); }
  .cat-bar-label span:last-child { color:var(--text); font-family:'Space Mono',monospace; }
  .cat-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .cat-bar-fill { height:100%; background:var(--red); border-radius:3px; transition:width 1s ease; }

  /* LOADING STATE */
  .loading-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .skeleton {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; animation:shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%,100% { opacity:.6; } 50% { opacity:1; }
  }
  .skel-thumb { aspect-ratio:16/9; background:var(--border); }
  .skel-body { padding:14px 16px; }
  .skel-line { height:10px; background:var(--border); border-radius:4px; margin-bottom:8px; }
  .skel-line.short { width:60%; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; }
  .empty-state .icon { font-size:48px; margin-bottom:16px; opacity:.4; }
  .empty-state h3 { font-size:18px; color:var(--muted); margin-bottom:8px; }
  .empty-state p { font-size:14px; color:var(--muted); opacity:.6; }

  /* API CONFIG BANNER */
  .api-banner {
    background:rgba(255,183,0,.08); border:1px solid rgba(255,183,0,.2);
    border-radius:10px; padding:14px 18px; margin-bottom:20px;
    display:flex; align-items:center; gap:12px; font-size:13px;
  }
  .api-banner a { color:#FFD700; text-decoration:none; }
  .api-banner-close { margin-left:auto; cursor:pointer; color:var(--muted); background:none; border:none; font-size:16px; }

  /* TOAST */
  .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:var(--card2); border:1px solid var(--border);
    border-radius:8px; padding:12px 18px; font-size:13px;
    display:flex; align-items:center; gap:10px;
    transform:translateX(120%); transition:transform .3s;
    min-width:260px; max-width:360px;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { transform:translateX(0); }
  .toast.success { border-left:3px solid var(--green); }
  .toast.error { border-left:3px solid var(--red); }
  .toast.info { border-left:3px solid var(--blue); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }
  .modal {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:32px; width:90%; max-width:500px;
    transform:translateY(16px); transition:transform .3s;
  }
  .modal-overlay.active .modal { transform:translateY(0); }
  .modal-close {
    float:right; background:none; border:1px solid var(--border);
    color:var(--muted); width:30px; height:30px; border-radius:50%;
    cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { color:var(--text); }

  /* RESPONSIVE */
  @media(max-width:1100px) { .grid-two { grid-template-columns:1fr; } }
  @media(max-width:900px) {
    .sidebar { display:none; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .content { padding:16px; }
    .topbar { padding:12px 16px; flex-wrap:wrap; }
  }
  @media(max-width:500px) {
    .stats-row { grid-template-columns:1fr; }
    .videos-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-dot"></div>
    <div class="logo-text">TREND<span>PULSE</span></div>
  </a>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Main</div>
    <button class="nav-item active" onclick="switchView('trending')">
      <span class="icon">🔥</span> Trending Now
      <span class="nav-badge" id="trendingCount">–</span>
    </button>
    <button class="nav-item" onclick="switchView('charts')">
      <span class="icon">📊</span> Trend Charts
    </button>
    <button class="nav-item" onclick="switchView('channels')">
      <span class="icon">📺</span> Top Channels
    </button>
    <button class="nav-item" onclick="switchView('bookmarks')">
      <span class="icon">🔖</span> Bookmarks
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Categories</div>
    <button class="nav-item" onclick="filterCategory('')">
      <span class="icon">🌐</span> All Categories
    </button>
    <button class="nav-item" onclick="filterCategory(17)">
      <span class="icon">⚽</span> Sports
    </button>
    <button class="nav-item" onclick="filterCategory(10)">
      <span class="icon">🎵</span> Music
    </button>
    <button class="nav-item" onclick="filterCategory(20)">
      <span class="icon">🎮</span> Gaming
    </button>
    <button class="nav-item" onclick="filterCategory(28)">
      <span class="icon">🔬</span> Science & Tech
    </button>
    <button class="nav-item" onclick="filterCategory(24)">
      <span class="icon">🎭</span> Entertainment
    </button>
    <button class="nav-item" onclick="filterCategory(25)">
      <span class="icon">📰</span> News & Politics
    </button>
    <button class="nav-item" onclick="filterCategory(27)">
      <span class="icon">📚</span> Education
    </button>
    <button class="nav-item" onclick="filterCategory(22)">
      <span class="icon">👤</span> People & Blogs
    </button>
    <button class="nav-item" onclick="filterCategory(23)">
      <span class="icon">😂</span> Comedy
    </button>
  </div>

  <div id="adminSidebarSection"></div>

  <div class="sidebar-user" id="sidebarUser">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail">–</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Logout">↩</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">🔥 TRENDING NOW</div>
    <select class="region-select" id="regionSelect" onchange="onRegionChange()">
      <option value="US">🇺🇸 United States</option>
    </select>
    <select class="category-select" id="categorySelect" onchange="onCategoryChange()">
      <option value="">All Categories</option>
    </select>
    <select class="time-select" id="timeSelect" onchange="renderCharts()">
      <option value="7">Last 7 Days</option>
      <option value="30" selected>Last 1 Month</option>
      <option value="90">Last 3 Months</option>
      <option value="365">Last 1 Year</option>
    </select>
    <button class="refresh-btn" id="refreshBtn" onclick="loadTrending(true)">
      <span id="refreshIcon">↺</span> Refresh
    </button>
    <div id="callsBadge" style="font-size:11px;font-family:'Space Mono',monospace;padding:6px 12px;border-radius:6px;border:1px solid rgba(0,212,106,.2);background:rgba(0,212,106,.1);color:#00C853;white-space:nowrap;">3 refreshes left</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent">
    <!-- Filled by JS -->
  </div>
</div>

<!-- VIDEO DETAIL MODAL -->
<div class="modal-overlay" id="videoModal">
  <div class="modal">
    <button class="modal-close" onclick="closeVideoModal()">✕</button>
    <div id="videoModalContent"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- RATE LIMIT WARNING BANNER (replaces modal) -->
<div id="limitBanner" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;width:90%;max-width:520px;">
  <div style="background:#1A1A1A;border:1px solid rgba(255,31,31,.4);border-radius:14px;padding:20px 24px;box-shadow:0 16px 48px rgba(0,0,0,.6);display:flex;align-items:flex-start;gap:16px;">
    <div style="font-size:32px;flex-shrink:0;margin-top:2px;">⏳</div>
    <div style="flex:1;min-width:0;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;margin-bottom:4px;color:#F0F0F0;">Daily Refresh Limit Reached</div>
      <div style="font-size:13px;color:#777;line-height:1.6;margin-bottom:10px;">You've used all <strong style="color:#F0F0F0;">3 free refreshes</strong> for today. You can still browse, filter categories, and watch videos — just no new data until midnight.</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:11px;color:#555;font-family:'Space Mono',monospace;">RESETS IN</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#FFD700;" id="countdownTimer">--:--:--</div>
      </div>
    </div>
    <button onclick="document.getElementById('limitBanner').style.display='none'" style="background:none;border:1px solid #2A2A2A;color:#555;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;" onmouseover="this.style.borderColor='#555';this.style.color='#F0F0F0'" onmouseout="this.style.borderColor='#2A2A2A';this.style.color='#555'">✕</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const ADMIN_EMAIL      = 'deepmagar505@gmail.com';
const USER_DAILY_LIMIT = 3;
const TOP_PER_CATEGORY = 20;

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const STATE = {
  currentView: 'trending',
  region: 'US',
  category: '',          // '' = All, number = specific category
  timeRange: 30,
  videos: [],            // flat list of ALL fetched videos across categories
  categoryCache: {},     // { catId: [top20 videos], '' : [top20 overall], ... }
  bookmarks: JSON.parse(localStorage.getItem('tp_bookmarks') || '[]'),
  apiKeys: JSON.parse(localStorage.getItem('tp_api_keys') || '[]'),
  currentKeyIndex: 0,
  loading: false,
  chartInstance: null,
  catChartInstance: null,
};

// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const CATEGORIES = [
  {id:'', name:'All Categories', icon:'🌐'},
  {id:1, name:'Film & Animation', icon:'🎬'},
  {id:2, name:'Autos & Vehicles', icon:'🚗'},
  {id:10, name:'Music', icon:'🎵'},

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  populateSelects();

});

function checkAuth() {
  const user = JSON.parse(localStorage.getItem('tp_user') || 'null');
  if (!user || !localStorage.getItem('tp_token')) {
    window.location.href = 'index.html'; return;
  }
  // Admin trying to use user dashboard → redirect to admin panel
  if (user.role === 'admin') {
    window.location.href = 'admin.html'; return;
  }
  document.getElementById('userName').textContent = user.username || 'User';
  document.getElementById('userEmail').textContent = user.email || '';
  document.getElementById('userAvatar').textContent = (user.username || 'U')[0].toUpperCase();

  // Admin panel link only visible to admins — hidden for all regular users
  document.getElementById('adminSidebarSection').innerHTML = '';

  // Check rate limit on load
  checkRateLimit(false);
  startCountdownIfBlocked();
}

// ── Rate limit helpers ──
function getUserCallsDb() {
  const db = JSON.parse(localStorage.getItem('tp_users_db') || '{}');
  const user = JSON.parse(localStorage.getItem('tp_user') || '{}');
  return { db, email: user.email, user };
}

function getTodayCalls() {
  const { db, email } = getUserCallsDb();
  const today = new Date().toDateString();
  return (db[email]?.calls?.[today]) || 0;
}

function incrementCall() {
  const { db, email } = getUserCallsDb();
  const today = new Date().toDateString();
  if (!db[email]) db[email] = { calls: {} };
  if (!db[email].calls) db[email].calls = {};
  db[email].calls[today] = (db[email].calls[today] || 0) + 1;
  localStorage.setItem('tp_users_db', JSON.stringify(db));
}

function checkRateLimit(showWarning = true) {
  const calls = getTodayCalls();
  updateCallsBadge(calls);
  if (calls >= USER_DAILY_LIMIT) {
    disableRefreshButton();
    if (showWarning) showLimitBanner();
    return false;
  }
  return true;
}

function disableRefreshButton() {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.style.opacity = '0.4';
  btn.style.cursor  = 'not-allowed';
  btn.style.pointerEvents = 'none';
  btn.title = 'Daily refresh limit reached — resets at midnight';
  btn.innerHTML = '🚫 Limit Reached';
}

function showLimitBanner() {
  const banner = document.getElementById('limitBanner');
  if (banner) {
    banner.style.display = 'block';
    startCountdown();
  }
}

function startCountdownIfBlocked() {
  if (getTodayCalls() >= USER_DAILY_LIMIT) {
    disableRefreshButton();
    showLimitBanner();
  }
}

function startCountdown() {
  function tick() {
    const now = new Date();
    const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    const el = document.getElementById('countdownTimer');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
}

function updateCallsBadge(calls) {
  const remaining = Math.max(0, USER_DAILY_LIMIT - calls);
  const badge = document.getElementById('callsBadge');
  if (!badge) return;
  if (remaining === 0) {
    badge.textContent = '🚫 Limit reached — resets at midnight';
    badge.style.background   = 'rgba(255,31,31,.12)';
    badge.style.color        = '#FF6B6B';
    badge.style.borderColor  = 'rgba(255,31,31,.3)';
  } else {
    badge.textContent = `${remaining} refresh${remaining !== 1 ? 'es' : ''} left`;
    badge.style.background  = remaining === 1 ? 'rgba(249,115,22,.15)' : 'rgba(0,212,106,.1)';
    badge.style.color       = remaining === 1 ? '#F97316' : '#00C853';
    badge.style.borderColor = remaining === 1 ? 'rgba(249,115,22,.3)' : 'rgba(0,212,106,.2)';
  }
}

// ═══════════════════════════════════════════════
// API KEY ROTATION
// ═══════════════════════════════════════════════
function getCurrentApiKey() {
  const keys = STATE.apiKeys;
  if (!keys || keys.length === 0) return null;
  return keys[STATE.currentKeyIndex % keys.length];
}

async function fetchWithKeyRotation(url) {
  const keys = STATE.apiKeys;
  if (!keys || keys.length === 0) return null;

  for (let attempt = 0; attempt < keys.length; attempt++) {
    const keyIndex = (STATE.currentKeyIndex + attempt) % keys.length;
    const key = keys[keyIndex];
    const fullUrl = url + (url.includes('?') ? '&' : '?') + 'key=' + key;

    try {
      const resp = await fetch(fullUrl);
      const data = await resp.json();

      if (data.error) {
        if (data.error.code === 403 || data.error.status === 'RESOURCE_EXHAUSTED') {
          showToast(`Key ${keyIndex + 1} quota exceeded. Switching to backup...`, 'info');
          STATE.currentKeyIndex = (keyIndex + 1) % keys.length;
          continue;
        }
        throw new Error(data.error.message);
      }
      STATE.currentKeyIndex = keyIndex;
      return data;
    } catch(e) {
      if (attempt === keys.length - 1) throw e;
    }
  }
  throw new Error('All API keys exhausted');
}

// ═══════════════════════════════════════════════
// FETCH TRENDING — fetches ALL categories on refresh
// ═══════════════════════════════════════════════
async function loadTrending(forceRefresh = false) {
  if (STATE.loading) return;

  // Rate limit check — one call per refresh (covers all categories)
  if (!checkRateLimit(true)) return;

  STATE.loading = true;
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.classList.add('loading'); document.getElementById('refreshIcon').textContent = '⟳'; }

  // Categories to fetch top-20 for (key sidebar categories + overall)
  const FETCH_CATS = [
    { id: '',   name: 'All',              icon: '🌐' },
    { id: '17', name: 'Sports',           icon: '⚽' },
    { id: '10', name: 'Music',            icon: '🎵' },
    { id: '20', name: 'Gaming',           icon: '🎮' },
    { id: '28', name: 'Science & Tech',   icon: '🔬' },
    { id: '24', name: 'Entertainment',    icon: '🎭' },
    { id: '25', name: 'News & Politics',  icon: '📰' },
    { id: '27', name: 'Education',        icon: '📚' },
    { id: '22', name: 'People & Blogs',   icon: '👤' },
    { id: '23', name: 'Comedy',           icon: '😂' },
    { id: '1',  name: 'Film & Animation', icon: '🎬' },
    { id: '2',  name: 'Autos & Vehicles', icon: '🚗' },
    { id: '15', name: 'Pets & Animals',   icon: '🐾' },
    { id: '19', name: 'Travel & Events',  icon: '✈️' },
    { id: '26', name: 'Howto & Style',    icon: '💄' },
  ];

  try {
    STATE.categoryCache = {};

    if (STATE.apiKeys.length > 0) {
      // Real API: fetch each category sequentially (rotating keys)
      incrementCall();
      updateCallsBadge(getTodayCalls());

      for (const cat of FETCH_CATS) {
        try {
          let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${STATE.region}&maxResults=${TOP_PER_CATEGORY}&hl=en_US`;
          if (cat.id) url += `&videoCategoryId=${cat.id}`;
          const data = await fetchWithKeyRotation(url);
          STATE.categoryCache[cat.id] = (data.items || []).map((item, i) => mapVideo(item, i));
        } catch(e) {
          STATE.categoryCache[cat.id] = [];
        }
      }
      showToast(`Loaded trending videos for ${STATE.region} — ${FETCH_CATS.length} categories`, 'success');

    } else {
      // Check for admin pre-fetched cache first
      const prefetch = JSON.parse(localStorage.getItem('tp_prefetch_cache') || 'null');

      if (prefetch && prefetch.categories && Object.keys(prefetch.categories).length > 0) {
        // Use admin-cached real YouTube data — counts as a user call
        incrementCall();
        updateCallsBadge(getTodayCalls());

        const cacheAge = Math.round((Date.now() - new Date(prefetch.fetchedAt)) / 60000);
        for (const cat of FETCH_CATS) {
          STATE.categoryCache[cat.id] = (prefetch.categories[cat.id] || []).slice(0, TOP_PER_CATEGORY);
        }
        showToast(`Loaded pre-fetched data for ${prefetch.region || 'your region'} · cached ${cacheAge}m ago`, 'success');

      } else {
        // No API keys, no cache — fallback to demo data
        incrementCall();
        updateCallsBadge(getTodayCalls());
        for (const cat of FETCH_CATS) {
          STATE.categoryCache[cat.id] = generateDemoVideos(TOP_PER_CATEGORY, cat.id, cat.name);
        }
        showToast('Demo data loaded — admin can pre-fetch real data from the admin panel', 'info');
      }
    }

    // Flatten all videos (deduplicated by id) for charts/channels
    const seen = new Set();
    STATE.videos = [];
    for (const vids of Object.values(STATE.categoryCache)) {
      for (const v of vids) {
        if (!seen.has(v.id)) { seen.add(v.id); STATE.videos.push(v); }
      }
    }

    document.getElementById('trendingCount').textContent = STATE.categoryCache['']?.length || STATE.videos.length;
    renderView();

  } catch(err) {
    showToast('Failed to load: ' + err.message, 'error');
    // Fallback demo on error
    for (const cat of FETCH_CATS) {
      STATE.categoryCache[cat.id] = generateDemoVideos(TOP_PER_CATEGORY, cat.id, cat.name);
    }
    STATE.videos = STATE.categoryCache[''] || [];
    renderView();
  } finally {
    STATE.loading = false;
    if (btn) { btn.classList.remove('loading'); document.getElementById('refreshIcon').textContent = '↺'; }
  }
}

function mapVideo(item, i) {
  return {
    id:          item.id,
    title:       item.snippet.title,
    channel:     item.snippet.channelTitle,
    channelId:   item.snippet.channelId,
    thumbnail:   item.snippet.thumbnails.maxres?.url
                 || item.snippet.thumbnails.high?.url
                 || item.snippet.thumbnails.medium?.url,
    views:       parseInt(item.statistics.viewCount  || 0),
    likes:       parseInt(item.statistics.likeCount  || 0),
    comments:    parseInt(item.statistics.commentCount || 0),
    duration:    formatDuration(item.contentDetails.duration),
    durationSec: parseDurationSec(item.contentDetails.duration),
    categoryId:  item.snippet.categoryId,
    publishedAt: item.snippet.publishedAt,
    description: (item.snippet.description || '').substring(0, 200),
    url:         `https://www.youtube.com/watch?v=${item.id}`,
    rank:        i + 1,
  };
}

function formatDuration(iso) {
  if (!iso) return '0:00';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  const h = parseInt(m?.[1]||0), min = parseInt(m?.[2]||0), s = parseInt(m?.[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function parseDurationSec(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  return parseInt(m?.[1]||0)*3600 + parseInt(m?.[2]||0)*60 + parseInt(m?.[3]||0);
}

function durationLabel(sec) {
  // Returns human label based on seconds
  if (sec < 60)    return '< 1 min';
  if (sec < 300)   return '1–5 min';
  if (sec < 600)   return '5–10 min';
  if (sec < 1200)  return '10–20 min';
  if (sec < 3600)  return '20–60 min';
  return '1 hr+';
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function timeSince(dateStr) {
  const sec = Math.floor((new Date() - new Date(dateStr)) / 1000);
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  return `${Math.floor(sec/86400)}d ago`;
}

function generateDemoVideos(count, catId = '', catName = 'All') {
  const key   = String(catId);
  const vids  = REAL_VIDEOS[key] || REAL_VIDEOS[''];
  const slice = vids.slice(0, Math.min(count, vids.length));
  return slice.map((v, i) => ({
    id:          v.id,
    title:       v.title,
    channel:     v.channel,
    thumbnail:   `https://img.youtube.com/vi/${v.id}/hqdefault.jpg`,
    views:       v.views,
    likes:       v.likes,
    comments:    Math.floor(v.views * 0.003),
    duration:    v.dur,
    durationSec: v.durSec,
    categoryId:  key || '0',
    publishedAt: new Date(Date.now() - Math.random() * 30 * 86400000).toISOString(),
    url:         `https://www.youtube.com/watch?v=${v.id}`,
    rank:        i + 1,
  }));
}

  document.getElementById('topbarTitle').textContent = titles[view] || '';
  renderView();
}

function filterCategory(catId) {
  // Just filter the already-loaded cache — NO new API call, NO rate limit consumed
  STATE.category = String(catId);
  document.getElementById('categorySelect').value = catId;
  document.getElementById('topbarTitle').textContent = catId === '' ? '🔥 TRENDING NOW' : `🔥 TRENDING — ${CATEGORIES.find(c=>String(c.id)===String(catId))?.name||''}`;
  STATE.currentView = 'trending';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');
  renderTrending();
}

function onRegionChange() {
  STATE.region = document.getElementById('regionSelect').value;
  // Region change needs fresh data — consume a call
  loadTrending(true);
}
function onCategoryChange() {
  // Dropdown category change — just re-filter from cache, no API call
  STATE.category = document.getElementById('categorySelect').value;
  renderTrending();
}

function renderView() {
  switch(STATE.currentView) {
    case 'trending':  renderTrending();  break;
    case 'charts':    renderCharts();    break;
    case 'channels':  renderChannels();  break;
    case 'bookmarks': renderBookmarks(); break;
  }
}

// ─── TRENDING VIEW ───
function renderTrending() {
  const catId = String(STATE.category);
  const regionObj = REGIONS.find(r => r.code === STATE.region);
  const content = document.getElementById('mainContent');

function renderSingleCategory(content, catId, regionObj) {

  const totalViews = vids.reduce((s,x)=>s+x.views,0);

  const topCh = (() => {
    const m = {}; vids.forEach(v=>{m[v.channel]=(m[v.channel]||0)+1;});

  // Duration distribution
  const avgDurSec = vids.length ? Math.round(vids.reduce((s,v)=>s+(v.durationSec||0),0)/vids.length) : 0;

        <div class="stat-change">Across top ${vids.length}</div>

        <div class="stat-icon">📺</div>
        <div class="stat-value" style="font-size:15px;letter-spacing:0">${topCh.substring(0,14)}</div>
        <div class="stat-label">TOP CHANNEL</div>

      </div>
    </div>
    <div class="panel grid-full">

        <div class="panel-title">${catObj?.icon||'🏷️'} ${(catObj?.name||'').toUpperCase()} — TOP ${vids.length}</div>
        <button onclick="filterCategory('')" style="background:none;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">← All Categories</button>
      </div>
      <div class="panel-body">
        ${vids.length
          ? `<div class="videos-grid">${renderVideoCards(vids)}</div>`
          : `<div class="empty-state"><div class="icon">📭</div><h3>No videos yet</h3><p>Click Refresh to load data for this region</p></div>`
        }
      </div>
    </div>
  `;
}

function renderVideoCards(videos) {
  if (!videos.length) return `<div class="empty-state"><div class="icon">📭</div><h3>No videos found</h3><p>Try a different region</p></div>`;
  return videos.map(v => {
    // Duration color coding
    const sec = v.durationSec || 0;
    const durColor = sec < 60 ? '#F97316' : sec < 300 ? '#3B82F6' : sec < 1200 ? '#00C853' : sec < 3600 ? '#A855F7' : '#FFD700';
    const durHint  = sec < 60 ? 'Short' : sec < 300 ? '1–5m' : sec < 1200 ? '5–20m' : sec < 3600 ? '20–60m' : '1hr+';
    return `
    <div class="video-card" onclick="openVideoModal(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="video-thumb-wrap">
        <img class="video-thumb" src="${v.thumbnail}" alt="${escHtml(v.title)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${v.id}/480/270'">
        <div class="video-rank ${v.rank <= 3 ? 'top3' : ''}">#${v.rank}</div>
        <div class="video-duration" style="background:rgba(0,0,0,.9);color:${durColor};font-weight:700;">${v.duration}</div>
        <div class="play-overlay">
          <div class="play-btn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <div class="video-info">
        <div class="video-title">${escHtml(v.title)}</div>
        <div class="video-channel">📺 ${escHtml(v.channel)}</div>
        <div class="video-meta">
          <span class="vm-item">👁️ ${formatNum(v.views)}</span>
          <span class="vm-item">👍 ${formatNum(v.likes)}</span>
          <span class="vm-item">💬 ${formatNum(v.comments)}</span>
          <span class="vm-item" style="color:${durColor};">⏱️ ${durHint}</span>
          <span class="vm-item">⏰ ${timeSince(v.publishedAt)}</span>
        </div>
      </div>
      <div class="video-actions">
        <button class="action-btn watch" onclick="event.stopPropagation();watchVideo('${v.url}')">▶ Watch</button>
        <button class="action-btn" onclick="event.stopPropagation();toggleBookmark(${JSON.stringify(v).replace(/"/g,'&quot;')})">${STATE.bookmarks.find(b=>b.id===v.id)?'🔖 Saved':'🔖 Save'}</button>
        <button class="action-btn" onclick="event.stopPropagation();shareVideo('${v.url}','${escHtml(v.title).replace(/'/g,"\\'")}')">↗ Share</button>
      </div>
    </div>
  `}).join('');
}

function initTrendChart() {
  const ctx = document.getElementById('trendChart')?.getContext('2d');
  if (!ctx) return;
  if (STATE.chartInstance) STATE.chartInstance.destroy();

  const days = parseInt(document.getElementById('chartTimeRange')?.value || 30);
  const labels = [];
  const data = [];
  const now = new Date();

  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now - i * 86400000);
    labels.push(days <= 7 ? d.toLocaleDateString('en',{weekday:'short'}) :
                days <= 30 ? d.toLocaleDateString('en',{month:'short',day:'numeric'}) :
                d.toLocaleDateString('en',{month:'short',day:'numeric'}));
    data.push(Math.floor(Math.random() * 80000000 + 20000000));
  }

  STATE.chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total Trending Views',
        data,
        borderColor: '#FF1F1F',
        backgroundColor: 'rgba(255,31,31,0.08)',
        borderWidth: 2,
        fill: true,
        tension: 0.4,
        pointRadius: days <= 7 ? 4 : 2,
        pointHoverRadius: 6,
        pointBackgroundColor: '#FF1F1F',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1C1C1C', borderColor: '#252525', borderWidth: 1,
          titleColor: '#F0F0F0', bodyColor: '#777',
          callbacks: { label: ctx => ' ' + formatNum(ctx.raw) + ' views' }
        }
      },
      scales: {
        x: { grid: { color: '#1E1E1E' }, ticks: { color: '#555', maxTicksLimit: 8 } },
        y: { grid: { color: '#1E1E1E' }, ticks: { color: '#555', callback: v => formatNum(v) } }
      }
    }
  });
}

function updateMainChart() { initTrendChart(); }

function initCatChart() {
  const ctx = document.getElementById('catChart')?.getContext('2d');
  if (!ctx) return;
  if (STATE.catChartInstance) STATE.catChartInstance.destroy();

  const catCounts = {};
  STATE.videos.forEach(v => {
    const cat = CATEGORIES.find(c => String(c.id) === String(v.categoryId))?.name || 'Other';
    catCounts[cat] = (catCounts[cat] || 0) + 1;
  });

  const sorted = Object.entries(catCounts).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const colors = ['#FF1F1F','#FF6B35','#FFD700','#00C853','#2196F3','#9C27B0','#FF9800','#00BCD4'];

  STATE.catChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([k]) => k),
      datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: colors, borderWidth: 0, hoverBorderWidth: 2, hoverBorderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#777', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1C1C1C', borderColor: '#252525', borderWidth: 1,
          titleColor: '#F0F0F0', bodyColor: '#777'
        }
      },
      cutout: '65%'
    }
  });
}

function renderCatBreakdown() {
  const el = document.getElementById('catBreakdown');
  if (!el) return;

  const catData = {};
  STATE.videos.forEach(v => {
    const cat = CATEGORIES.find(c => String(c.id) === String(v.categoryId));
    const name = cat?.name || 'Other';
    if (!catData[name]) catData[name] = { views: 0, count: 0 };
    catData[name].views += v.views;
    catData[name].count++;
  });

  const sorted = Object.entries(catData).sort((a,b) => b[1].views - a[1].views);
  const maxViews = sorted[0]?.[1].views || 1;

  el.innerHTML = sorted.slice(0, 12).map(([name, d]) => `
    <div class="cat-bar-item">
      <div class="cat-bar-label">
        <span>${name} (${d.count} videos)</span>
        <span>${formatNum(d.views)}</span>
      </div>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${(d.views/maxViews*100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
}

    <div style="display:flex;gap:16px;margin-bottom:16px;">
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);">${formatNum(video.views)}</div><div style="font-size:11px;color:var(--muted);">Views</div></div>
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;">${formatNum(video.likes)}</div><div style="font-size:11px;color:var(--muted);">Likes</div></div>
      <div style="text-align:center;"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;">${formatNum(video.comments)}</div><div style="font-size:11px;color:var(--muted);">Comments</div></div>
    </div>
    ${video.description ? `<p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;">${escHtml(video.description)}...</p>` : ''}
    <div style="display:flex;gap:10px;">
      <button onclick="watchVideo('${video.url}')" style="flex:2;padding:12px;background:var(--red);border:none;color:white;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">▶ Watch on YouTube</button>
      <button onclick="toggleBookmark(${JSON.stringify(video).replace(/"/g,'&quot;')});document.getElementById('videoModal').classList.remove('active')" style="flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;">${isBookmarked?'🔖 Saved':'🔖 Save'}</button>
    </div>
  `;
  modal.classList.add('active');
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('active');
}

function toggleBookmark(video) {
  const idx = STATE.bookmarks.findIndex(b => b.id === video.id);
  if (idx > -1) {
    STATE.bookmarks.splice(idx, 1);
    showToast('Removed from bookmarks', 'info');
  } else {
    STATE.bookmarks.push(video);
    showToast('Saved to bookmarks!', 'success');
  }
  localStorage.setItem('tp_bookmarks', JSON.stringify(STATE.bookmarks));
}

function shareVideo(url, title) {
  if (navigator.share) {
    navigator.share({ title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url);
    showToast('Link copied to clipboard!', 'success');
  }
}

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]}</span>${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

function logout() {
  localStorage.removeItem('tp_token');
  localStorage.removeItem('tp_user');
  window.location.href = 'index.html';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeVideoModal();
  }
});
</script>
</body>
</html>
