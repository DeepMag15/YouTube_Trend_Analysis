<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — TrendPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --red:#FF1F1F; --red-dark:#CC0000;
    --black:#0A0A0A; --dark:#0F0F0F;
    --card:#141414; --card2:#1A1A1A;
    --border:#222222; --text:#F0F0F0;
    --muted:#666; --gold:#FFD700;
    --green:#00D46A; --blue:#3B82F6;
    --orange:#F97316; --purple:#A855F7;
    --sidebar:260px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--black);color:var(--text);
    display:flex;height:100vh;overflow:hidden;
  }
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:var(--dark);}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

  /* ── SIDEBAR ── */
  .sidebar{
    width:var(--sidebar);background:var(--dark);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    flex-shrink:0;overflow-y:auto;z-index:100;
  }
  .sidebar-logo{
    padding:22px 20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;text-decoration:none;
  }
  .logo-dot{width:9px;height:9px;background:var(--red);border-radius:50%;animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;color:var(--text);}
  .logo-text span{color:var(--red);}
  .admin-badge{
    margin-left:auto;background:rgba(168,85,247,.15);
    border:1px solid rgba(168,85,247,.3);
    color:#A855F7;font-size:9px;font-family:'Space Mono',monospace;
    padding:3px 8px;border-radius:4px;letter-spacing:1px;
  }

  .sb-section{padding:18px 14px 6px;}
  .sb-label{
    font-family:'Space Mono',monospace;font-size:9px;
    letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;
    padding:0 6px;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-radius:8px;
    color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;transition:all .18s;margin-bottom:1px;
    border:none;background:none;width:100%;text-align:left;
    text-decoration:none;
  }
  .nav-item:hover{background:var(--card2);color:var(--text);}
  .nav-item.active{background:rgba(255,31,31,.1);color:var(--text);border-left:2px solid var(--red);}
  .nav-item .ni{width:16px;text-align:center;font-size:14px;}
  .nav-pill{
    margin-left:auto;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:100px;
    font-family:'Space Mono',monospace;
  }
  .pill-red{background:rgba(255,31,31,.2);color:var(--red);}
  .pill-green{background:rgba(0,212,106,.15);color:var(--green);}
  .pill-orange{background:rgba(249,115,22,.15);color:var(--orange);}

  .sb-divider{height:1px;background:var(--border);margin:8px 14px;}

  .sb-user{
    margin-top:auto;padding:14px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }
  .user-av{
    width:34px;height:34px;background:var(--purple);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;flex-shrink:0;
  }
  .user-inf{flex:1;min-width:0;}
  .user-nm{font-size:12px;font-weight:600;}
  .user-role{font-size:10px;color:var(--purple);}
  .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;border-radius:4px;transition:color .2s;}
  .logout-btn:hover{color:var(--red);}

  /* ── MAIN ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  .topbar{
    padding:14px 28px;background:var(--dark);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:14px;flex-shrink:0;
  }
  .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;flex:1;}
  .topbar-time{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
    background:var(--card);padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  }
  .tb-btn{
    background:var(--card);border:1px solid var(--border);
    color:var(--muted);padding:7px 14px;border-radius:7px;
    cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;
    transition:all .2s;display:flex;align-items:center;gap:6px;
  }
  .tb-btn:hover{color:var(--text);border-color:var(--red);}
  .tb-btn.danger:hover{border-color:var(--red);color:var(--red);}
  .tb-btn.primary{background:var(--red);border-color:var(--red);color:white;}
  .tb-btn.primary:hover{background:var(--red-dark);}

  .content{flex:1;overflow-y:auto;padding:24px 28px;}

  /* ── CARDS ── */
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
  .stat-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:18px 18px;
    position:relative;overflow:hidden;
  }
  .stat-glow{
    position:absolute;top:-30px;right:-30px;
    width:80px;height:80px;border-radius:50%;
    opacity:.06;
  }
  .stat-icon-wrap{
    width:36px;height:36px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;margin-bottom:12px;
  }
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.4px;}
  .stat-delta{font-size:10px;margin-top:5px;font-family:'Space Mono',monospace;}
  .delta-up{color:var(--green);}
  .delta-down{color:var(--red);}

  /* ── PANELS ── */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px;}
  .grid-full{margin-bottom:18px;}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .ph{
    padding:14px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .pt{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;}
  .pb{padding:18px;}

  /* ── API KEY CARDS ── */
  .api-keys-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .api-key-card{
    background:var(--card2);border:1px solid var(--border);
    border-radius:10px;padding:20px;position:relative;overflow:hidden;
    transition:border-color .2s;
  }
  .api-key-card.active-key{border-color:var(--green);}
  .api-key-card.warn-key{border-color:var(--orange);}
  .api-key-card.dead-key{border-color:#333;opacity:.6;}

  .key-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .key-priority{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;
    padding:3px 10px;border-radius:4px;
  }
  .key-priority.p1{background:rgba(0,212,106,.1);color:var(--green);}
  .key-priority.p2{background:rgba(59,130,246,.1);color:var(--blue);}
  .key-priority.p3{background:rgba(249,115,22,.1);color:var(--orange);}

  .key-status-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px;
  }
  .dot-green{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
  .dot-orange{background:var(--orange);}
  .dot-red{background:var(--red);}
  .dot-grey{background:#444;}

  .key-name{font-size:14px;font-weight:600;margin-bottom:4px;}
  .key-value{
    font-family:'Space Mono',monospace;font-size:10px;
    color:var(--muted);background:var(--black);
    padding:7px 10px;border-radius:6px;border:1px solid var(--border);
    margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
    word-break:break-all;
  }
  .copy-btn{
    background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:13px;padding:2px 6px;border-radius:4px;transition:color .2s;flex-shrink:0;
  }
  .copy-btn:hover{color:var(--text);}

  .quota-block{margin-bottom:14px;}
  .quota-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .quota-label{font-size:11px;color:var(--muted);}
  .quota-nums{font-family:'Space Mono',monospace;font-size:11px;}
  .quota-used{color:var(--text);}
  .quota-total{color:var(--muted);}
  .quota-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .quota-fill{height:100%;border-radius:3px;transition:width .8s ease;}
  .fill-green{background:var(--green);}
  .fill-orange{background:var(--orange);}
  .fill-red{background:var(--red);}

  .key-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
  .km-item{background:var(--black);border:1px solid var(--border);border-radius:6px;padding:8px 10px;}
  .km-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
  .km-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

  .key-actions{display:flex;gap:8px;}
  .key-btn{
    flex:1;padding:7px;font-size:11px;font-family:'DM Sans',sans-serif;
    border-radius:6px;cursor:pointer;transition:all .2s;text-align:center;
    display:flex;align-items:center;justify-content:center;gap:4px;
  }
  .key-btn.edit{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .key-btn.edit:hover{border-color:var(--blue);color:var(--blue);}
  .key-btn.rotate{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .key-btn.rotate:hover{border-color:var(--green);color:var(--green);}
  .key-btn.disable{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .key-btn.disable:hover{border-color:var(--red);color:var(--red);}

  .active-indicator{
    position:absolute;top:0;right:0;
    background:var(--green);color:var(--black);
    font-size:9px;font-family:'Space Mono',monospace;font-weight:700;
    padding:4px 10px;border-radius:0 10px 0 8px;letter-spacing:1px;
  }

  /* ── USAGE CHART ── */
  .chart-container{height:220px;position:relative;}
  .chart-sm{height:160px;}

  /* ── USAGE LOG TABLE ── */
  .log-table{width:100%;border-collapse:collapse;}
  .log-table th{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;
    color:var(--muted);text-transform:uppercase;padding:10px 14px;
    text-align:left;border-bottom:1px solid var(--border);
    background:var(--dark);
  }
  .log-table td{
    padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);
    vertical-align:middle;
  }
  .log-table tr:hover td{background:rgba(255,255,255,.015);}
  .log-table tr:last-child td{border-bottom:none;}
  .status-badge{
    font-size:10px;font-family:'Space Mono',monospace;
    padding:3px 10px;border-radius:4px;
  }
  .badge-ok{background:rgba(0,212,106,.1);color:var(--green);}
  .badge-warn{background:rgba(249,115,22,.12);color:var(--orange);}
  .badge-err{background:rgba(255,31,31,.1);color:var(--red);}
  .badge-skip{background:rgba(255,255,255,.05);color:var(--muted);}

  /* ── USERS TABLE ── */
  .users-table{width:100%;border-collapse:collapse;}
  .users-table th{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;
    color:var(--muted);text-transform:uppercase;padding:10px 14px;
    text-align:left;border-bottom:1px solid var(--border);
    background:var(--dark);
  }
  .users-table td{
    padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);
    vertical-align:middle;
  }
  .users-table tr:hover td{background:rgba(255,255,255,.02);}
  .users-table tr:last-child td{border-bottom:none;}
  .u-av{
    width:28px;height:28px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;flex-shrink:0;
  }

  /* ── ADD KEY MODAL ── */
  .modal-overlay{
    position:fixed;inset:0;z-index:9999;
    background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{
    background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:32px;width:90%;max-width:480px;
    transform:translateY(18px);transition:transform .3s;position:relative;
  }
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-x{
    position:absolute;top:18px;right:18px;background:var(--card2);
    border:1px solid var(--border);color:var(--muted);
    width:28px;height:28px;border-radius:50%;cursor:pointer;
    font-size:13px;display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .modal-x:hover{color:var(--text);}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:6px;}
  .modal p.sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
  .fg{margin-bottom:16px;}
  .fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
  .fg input,.fg select{
    width:100%;background:var(--dark);border:1px solid var(--border);
    color:var(--text);padding:10px 14px;border-radius:8px;
    font-family:'Space Mono',monospace;font-size:12px;outline:none;
    transition:border-color .2s;
  }
  .fg input:focus,.fg select:focus{border-color:var(--red);}
  .fg select{font-family:'DM Sans',sans-serif;font-size:13px;}
  .modal-submit{
    width:100%;padding:12px;background:var(--red);border:none;
    color:white;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;
    transition:background .2s;
  }
  .modal-submit:hover{background:var(--red-dark);}

  /* ── TOAST ── */
  .toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
  .toast{
    background:var(--card2);border:1px solid var(--border);
    border-radius:8px;padding:11px 16px;font-size:12px;
    display:flex;align-items:center;gap:10px;
    transform:translateX(110%);transition:transform .3s;
    min-width:240px;max-width:340px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  .toast.show{transform:translateX(0);}
  .toast.s{border-left:3px solid var(--green);}
  .toast.e{border-left:3px solid var(--red);}
  .toast.i{border-left:3px solid var(--blue);}

  /* ── TIMELINE ── */
  .timeline{display:flex;flex-direction:column;gap:0;}
  .tl-item{
    display:flex;gap:14px;padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,.03);
  }
  .tl-item:last-child{border-bottom:none;}
  .tl-dot{
    width:8px;height:8px;border-radius:50%;
    flex-shrink:0;margin-top:4px;
  }
  .tl-line{display:flex;flex-direction:column;flex:1;min-width:0;}
  .tl-title{font-size:12px;margin-bottom:2px;}
  .tl-time{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}

  /* ── DONUT LEGEND ── */
  .donut-legend{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
  .dl-item{display:flex;align-items:center;gap:8px;font-size:12px;}
  .dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dl-name{flex:1;color:var(--muted);}
  .dl-pct{font-family:'Space Mono',monospace;font-size:11px;}

  /* ── GAUGE ── */
  .gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0;}
  .gauge-num{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;}
  .gauge-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;}

  /* ── RESPONSIVE ── */
  @media(max-width:1200px){.stats-row{grid-template-columns:repeat(3,1fr);}.api-keys-grid{grid-template-columns:1fr;}}
  @media(max-width:900px){.sidebar{display:none;}.content{padding:16px;}.grid-2,.grid-3{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-dot"></div>
    <div class="logo-text">TREND<span>PULSE</span></div>
    <span class="admin-badge">ADMIN</span>
  </a>

  <div class="sb-section">
    <div class="sb-label">Overview</div>
    <button class="nav-item active" onclick="setView('overview',this)">
      <span class="ni">📊</span> Dashboard
    </button>
    <button class="nav-item" onclick="setView('prefetch',this)">
      <span class="ni">📡</span> Pre-fetch Data
      <span class="nav-pill pill-green" id="sbCacheCount">–</span>
    </button>
    <button class="nav-item" onclick="setView('apikeys',this)">
      <span class="ni">🔑</span> API Keys
      <span class="nav-pill pill-green" id="sbKeyCount">3</span>
    </button>
    <button class="nav-item" onclick="setView('usage',this)">
      <span class="ni">📈</span> Usage Logs
      <span class="nav-pill pill-orange" id="sbLogCount">–</span>
    </button>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Management</div>
    <button class="nav-item" onclick="setView('users',this)">
      <span class="ni">👥</span> Users
      <span class="nav-pill pill-red" id="sbUserCount">–</span>
    </button>
    <button class="nav-item" onclick="setView('regions',this)">
      <span class="ni">🌍</span> Regions
    </button>
    <button class="nav-item" onclick="setView('categories',this)">
      <span class="ni">🏷️</span> Categories
    </button>
    <button class="nav-item" onclick="setView('settings',this)">
      <span class="ni">⚙️</span> Settings
    </button>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Quick Links</div>
    <a class="nav-item" href="dashboard.html">
      <span class="ni">🔥</span> User Dashboard
    </a>
    <a class="nav-item" href="index.html">
      <span class="ni">🏠</span> Landing Page
    </a>
  </div>

  <div class="sb-user">
    <div class="user-av">A</div>
    <div class="user-inf">
      <div class="user-nm" id="adminName">Admin</div>
      <div class="user-role">SUPERADMIN</div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Logout">↩</button>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">📊 ADMIN DASHBOARD</div>
    <div class="topbar-time" id="liveTime">–</div>
    <button class="tb-btn" onclick="exportData()">⬇ Export</button>
    <button class="tb-btn primary" onclick="openAddKeyModal()">+ Add API Key</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- ADD / EDIT KEY MODAL -->
<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">ADD API KEY</h3>
    <p class="sub" id="modalSub">Add a new YouTube Data API v3 key to the rotation pool</p>
    <div class="fg">
      <label>KEY NAME</label>
      <input type="text" id="mKeyName" placeholder="e.g. Primary Key">
    </div>
    <div class="fg">
      <label>API KEY</label>
      <input type="text" id="mKeyValue" placeholder="AIzaSy...">
    </div>
    <div class="fg">
      <label>PRIORITY</label>
      <select id="mKeyPriority">
        <option value="1">1 — Primary (First used)</option>
        <option value="2">2 — Secondary (Backup)</option>
        <option value="3">3 — Tertiary (Final backup)</option>
      </select>
    </div>
    <div class="fg">
      <label>DAILY QUOTA LIMIT</label>
      <input type="number" id="mKeyQuota" value="10000" placeholder="10000">
    </div>
    <button class="modal-submit" onclick="saveKey()">Save API Key</button>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════

  view: 'overview',

// Load/Init data from localStorage (simulates DB for pure-frontend demo)
function loadData() {
  // ── Clean up any stale placeholder keys left in user-facing storage ──
  try {
    const stale = JSON.parse(localStorage.getItem('tp_api_keys') || '[]');
    const cleaned = stale.filter(k => isRealKey(k));
    localStorage.setItem('tp_api_keys', JSON.stringify(cleaned));
  } catch(e) { localStorage.setItem('tp_api_keys', '[]'); }

  const savedKeys = JSON.parse(localStorage.getItem('admin_api_keys') || 'null');
  STATE.apiKeys = savedKeys || [
    { id:1, name:'Primary Key',   value:'', priority:1, quota:10000, used:0, status:'active',  requests:0, errors:0, lastUsed: new Date().toISOString(), addedAt: new Date().toISOString().split('T')[0] },
    { id:2, name:'Secondary Key', value:'', priority:2, quota:10000, used:0, status:'active',  requests:0, errors:0, lastUsed: new Date().toISOString(), addedAt: new Date().toISOString().split('T')[0] },
    { id:3, name:'Tertiary Key',  value:'', priority:3, quota:10000, used:0, status:'active',  requests:0, errors:0, lastUsed: new Date().toISOString(), addedAt: new Date().toISOString().split('T')[0] },
  ];

  // Only persist real keys to user-facing storage — never placeholders
  syncUserKeys();

  STATE.users = JSON.parse(localStorage.getItem('admin_users') || 'null') || [
    { id:1, username:'johndoe',    email:'john@example.com',    region:'US', joined:'2025-01-12', lastLogin:'2025-03-05', bookmarks:14, status:'active'  },
    { id:2, username:'sakura_jp',  email:'sakura@example.com',  region:'JP', joined:'2025-01-18', lastLogin:'2025-03-06', bookmarks:7,  status:'active'  },
    { id:3, username:'mumbaiuser', email:'rohan@example.com',   region:'IN', joined:'2025-01-20', lastLogin:'2025-03-04', bookmarks:23, status:'active'  },
    { id:4, username:'testuser99', email:'test@example.com',    region:'GB', joined:'2025-02-01', lastLogin:'2025-02-28', bookmarks:2,  status:'inactive'},
    { id:5, username:'lena_de',    email:'lena@example.com',    region:'DE', joined:'2025-02-10', lastLogin:'2025-03-06', bookmarks:9,  status:'active'  },
    { id:6, username:'carlos_br',  email:'carlos@example.com',  region:'BR', joined:'2025-02-15', lastLogin:'2025-03-01', bookmarks:5,  status:'active'  },
  ];

  STATE.logs = generateLogs();
  updateSidebarCounts();
}

function isRealKey(value) {
  // A real YouTube Data API key starts with 'AIza' and is ~39 chars long
  return value && value.startsWith('AIza') && value.length >= 30 && !value.includes('here') && !value.includes('key-');
}

function syncUserKeys() {
  // Only write REAL, non-placeholder, active keys to tp_api_keys
  const realKeys = STATE.apiKeys
    .filter(k => k.status !== 'disabled' && isRealKey(k.value))
    .map(k => k.value);
  localStorage.setItem('tp_api_keys', JSON.stringify(realKeys));
}

function updateSidebarCounts() {
  const realActive = STATE.apiKeys.filter(k => k.status !== 'disabled' && isRealKey(k.value)).length;
  const sbKey = document.getElementById('sbKeyCount');
  const sbLog = document.getElementById('sbLogCount');
  const sbUsr = document.getElementById('sbUserCount');
  if (sbKey) sbKey.textContent = realActive;
  if (sbLog) sbLog.textContent = STATE.logs?.length || 0;
  if (sbUsr) sbUsr.textContent = STATE.users?.length || 0;
  updateCacheCount();
}

function saveKeys() {
  localStorage.setItem('admin_api_keys', JSON.stringify(STATE.apiKeys));
  syncUserKeys();
  updateSidebarCounts();
}

function updateCacheCount() {
  const cache = JSON.parse(localStorage.getItem('tp_prefetch_cache') || 'null');
  const el = document.getElementById('sbCacheCount');
  if (!el) return;
  if (cache && cache.categories) {
    const n = Object.keys(cache.categories).length;
    el.textContent = n + ' cats';
    el.className = 'nav-pill pill-green';
  } else {
    el.textContent = 'none';
    el.className = 'nav-pill pill-orange';
  }
}

function generateLogs() {
  const actions = ['trending_fetch','video_details','search_query','channel_info','category_list'];
  const regions = ['US','IN','JP','GB','BR','DE','KR','FR','AU','MX'];
  const logs = [];
  for (let i = 0; i < 60; i++) {
    const keyId = [1,1,1,2,2,3][Math.floor(Math.random()*6)];
    const key = STATE.apiKeys.find(k=>k.id===keyId);
    const ok = Math.random() > 0.08;
    logs.push({
      id: i+1,
      keyId,
      keyName: key?.name || 'Key '+keyId,
      action: actions[Math.floor(Math.random()*actions.length)],
      region: regions[Math.floor(Math.random()*regions.length)],
      units: [1,100,50,25,200][Math.floor(Math.random()*5)],
      status: ok ? 'success' : (Math.random()>.5 ? 'quota_exceeded' : 'error'),
      ts: new Date(Date.now() - i * 14 * 60000).toISOString(),
    });
  }
  return logs;
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  checkAdminAuth();
  loadData();
  startClock();
  updateCacheCount();
  setView('overview');
});

function checkAdminAuth() {
  const user = JSON.parse(localStorage.getItem('tp_user') || 'null');
  const token = localStorage.getItem('tp_token');
  if (!user || !token || user.role !== 'admin') {
    // Not admin — redirect to landing page
    localStorage.removeItem('tp_token');
    localStorage.removeItem('tp_user');
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('adminName').textContent = user.username || 'Admin';
}

function startClock() {
  function tick() {
    document.getElementById('liveTime').textContent = new Date().toLocaleTimeString('en-US', { hour12:false });
  }
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════
// VIEW ROUTER
// ═══════════════════════════════════════════════
function setView(view, el) {
  STATE.view = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');

  const titles = {
    overview:'📊 ADMIN DASHBOARD', apikeys:'🔑 API KEY MANAGER',
    prefetch:'📡 PRE-FETCH DATA CACHE',
    usage:'📈 USAGE LOGS', users:'👥 USER MANAGEMENT',
    regions:'🌍 REGIONS', categories:'🏷️ CATEGORIES', settings:'⚙️ SETTINGS'
  };
  document.getElementById('topbarTitle').textContent = titles[view] || '';

  // Destroy charts
  Object.values(STATE.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  STATE.charts = {};

  const c = document.getElementById('content');
  c.innerHTML = '';

  const views = { overview:renderOverview, apikeys:renderApiKeys, prefetch:renderPrefetch, usage:renderUsage, users:renderUsers, regions:renderRegions, categories:renderCategories, settings:renderSettings };
  (views[view] || renderOverview)();
}

function initUsageChart() {
  const ctx = document.getElementById('usageChart')?.getContext('2d');
  if (!ctx) return;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const colors = ['rgba(255,31,31,.8)','rgba(59,130,246,.7)','rgba(249,115,22,.7)'];

  STATE.charts.usage = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days,
      datasets: STATE.apiKeys.map((k, i) => ({
        label: k.name,
        data: Array.from({length:7}, () => Math.floor(Math.random()*3000)+200),
        backgroundColor: colors[i] || '#555',
        borderRadius: 4, borderSkipped: false,
      }))
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend: { labels: { color:'#666', font:{size:11} } }, tooltip: { callbacks: { label: c => ` ${fmtNum(c.raw)} units` } } },
      scales: {
        x: { stacked:true, grid:{color:'#1a1a1a'}, ticks:{color:'#555'} },
        y: { stacked:true, grid:{color:'#1a1a1a'}, ticks:{color:'#555', callback: v => fmtNum(v)} }
      }
    }
  });
}

function initKeyPieChart() {
  const ctx = document.getElementById('keyPieChart')?.getContext('2d');
  if (!ctx) return;
  const colors = ['#FF1F1F','#3B82F6','#F97316'];
  const total = STATE.apiKeys.reduce((s,k)=>s+k.requests,0)||1;

  STATE.charts.pie = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: STATE.apiKeys.map(k=>k.name),
      datasets:[{ data: STATE.apiKeys.map(k=>k.requests), backgroundColor:colors, borderWidth:0, hoverBorderWidth:2, hoverBorderColor:'#fff' }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'70%',
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => ` ${c.raw} requests (${((c.raw/total)*100).toFixed(1)}%)` } } }
    }
  });

  const leg = document.getElementById('keyLegend');
  if (leg) leg.innerHTML = STATE.apiKeys.map((k,i) => `
    <div class="dl-item">
      <div class="dl-dot" style="background:${colors[i]}"></div>
      <div class="dl-name">${k.name}</div>
      <div class="dl-pct">${((k.requests/total)*100).toFixed(0)}%</div>
    </div>
  `).join('');
}

function renderKeyStatusSummary() {
  const el = document.getElementById('keyStatusSummary');
  if (!el) return;
  el.innerHTML = STATE.apiKeys.map(k => {
    const pct = (k.used/k.quota)*100;
    const dotClass = k.status==='active'?'dot-green': k.status==='warning'?'dot-orange': k.status==='disabled'?'dot-grey':'dot-red';
    const fillClass = pct<70?'fill-green': pct<90?'fill-orange':'fill-red';
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div class="key-status-dot ${dotClass}"></div>
          <span style="font-size:12px;font-weight:600;">${k.name}</span>
          <span style="margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">${fmtNum(k.used)} / ${fmtNum(k.quota)}</span>
        </div>
        <div class="quota-bar"><div class="quota-fill ${fillClass}" style="width:${Math.min(pct,100)}%"></div></div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">${pct.toFixed(1)}% used · ${fmtNum(k.quota-k.used)} remaining</div>
      </div>
    `;
  }).join('');
}

function renderActivityTimeline() {
  const el = document.getElementById('activityTimeline');
  if (!el) return;
  const colors = { success:'var(--green)', quota_exceeded:'var(--orange)', error:'var(--red)' };
  el.innerHTML = STATE.logs.slice(0,8).map(l => `
    <div class="tl-item">
      <div class="tl-dot" style="background:${colors[l.status]||'#555'}"></div>
      <div class="tl-line">
        <div class="tl-title">${l.keyName} — <span style="color:var(--muted)">${l.action}</span> [${l.region}]</div>
        <div class="tl-time">${timeSince(l.ts)} · ${l.units} units · <span style="color:${colors[l.status]}">${l.status}</span></div>
      </div>
    </div>
  `).join('');
}

function initQuotaChart() {
  const ctx = document.getElementById('quotaChart')?.getContext('2d');
  if (!ctx) return;
  const colors = ['#FF1F1F','#3B82F6','#F97316'];
  STATE.charts.quota = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: STATE.apiKeys.map(k=>k.name.replace(' Key','')),
      datasets: [
        { label:'Used', data: STATE.apiKeys.map(k=>k.used), backgroundColor: colors.map(c=>c+'cc'), borderRadius:4 },
        { label:'Remaining', data: STATE.apiKeys.map(k=>k.quota-k.used), backgroundColor:'rgba(255,255,255,.05)', borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{labels:{color:'#555',font:{size:10}}}, tooltip:{ callbacks:{ label: c => ` ${fmtNum(c.raw)} units` } } },
      scales:{
        x:{stacked:true,grid:{color:'#1a1a1a'},ticks:{color:'#555',font:{size:10}}},
        y:{stacked:true,grid:{color:'#1a1a1a'},ticks:{color:'#555',callback:v=>fmtNum(v)}}
      }
    }
  });
}

                <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px;">
                  <div style="height:100%;width:${Math.min(pct,100)}%;background:${pct>=100?'var(--red)':pct>=80?'var(--orange)':'var(--green)'};border-radius:2px;"></div>
                </div>
                <div style="font-size:10px;color:var(--muted);">${fmtNum(k.used)} / ${fmtNum(k.quota)} units</div>
                ` : `<div style="font-size:10px;color:#444;">No key set</div>`}
              </div>
              ${i<STATE.apiKeys.length-1?'<div style="display:flex;align-items:center;padding:0 4px;color:var(--muted);font-size:18px;">→</div>':''}
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="api-keys-grid" id="apiKeysGrid"></div>

    <div class="panel grid-full" style="margin-top:18px;">
      <div class="ph">
        <div class="pt">📈 HOURLY USAGE — ALL KEYS</div>
      </div>
      <div class="pb"><div class="chart-container"><canvas id="hourlyChart"></canvas></div></div>
    </div>
  `;

  // Pre-fill the test input with first real key
  const firstReal = STATE.apiKeys.find(k => isRealKey(k.value));
  if (firstReal) document.getElementById('diagKeyInput').value = firstReal.value;

  renderKeyCards();
  setTimeout(initHourlyChart, 50);
}

  const hasRealKeys = STATE.apiKeys.some(k => isRealKey(k.value) && k.status !== 'disabled');

  let warningBanner = '';
  if (!hasRealKeys) {
    warningBanner = `
      <div style="background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;">

          <div>
            <div class="key-priority ${priorityClass[k.priority-1] || 'p3'}">PRIORITY ${k.priority}</div>
          </div>
          <div class="key-status-dot ${realKey ? (dotClass[k.status] || 'dot-grey') : 'dot-grey'}"></div>

        <div class="key-value">

          ${realKey ? `<button class="copy-btn" onclick="toggleReveal(${k.id})" title="Reveal/Copy">👁</button>` : ''}
        </div>
        ${realKey ? `
        <div class="quota-block">
          <div class="quota-row">
            <span class="quota-label">Daily Quota</span>
            <span class="quota-nums"><span class="quota-used">${fmtNum(k.used)}</span> <span class="quota-total">/ ${fmtNum(k.quota)}</span></span>
          </div>
          <div class="quota-bar">
            <div class="quota-fill ${fillCls}" style="width:${Math.min(pct,100)}%" id="qfill${k.id}"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between;">
            <span>${pct.toFixed(1)}% consumed</span>

async function runDiagnostics() {
  const key = document.getElementById('diagKeyInput')?.value?.trim();
  const box = document.getElementById('diagResult');
  if (!box) return;

  if (!key || !key.startsWith('AIza') || key.length < 30) {
    box.style.display = 'block';
    box.innerHTML = diagCard('error', '❌ Invalid Key Format', 'Key must start with "AIza" and be ~39 characters. Check you copied it fully from Google Cloud Console.');
    return;
  }

  box.style.display = 'block';
  box.innerHTML = diagCard('info', '⏳ Testing...', 'Making a live request to YouTube Data API v3 from this browser...');

  try {
    const url  = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=US&maxResults=3&hl=en&key=${key}`;
    const resp = await fetch(url, { method: 'GET' });
    const data = await resp.json();

    if (data.error) {
      const code   = data.error.code;
      const status = data.error.status || '';
      const msg    = data.error.message || '';

      if (code === 403 && msg.toLowerCase().includes('referrer')) {
        box.innerHTML = diagCard('error', '❌ HTTP Referrer Blocked (403)',
          `Your key has an HTTP referrer restriction that blocks <strong>${location.origin}</strong>.<br><br>
          <strong>Fix:</strong> Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#3B82F6;">Cloud Console → Credentials</a> → click your key → under "Application restrictions" either:<br>
          • Set to <strong>None</strong>, OR<br>
          • Add <code style="background:#1a1a1a;padding:2px 6px;border-radius:4px;">${location.origin}/*</code> to the allowed referrers`);

      } else if (code === 403 && (msg.toLowerCase().includes('disabled') || msg.toLowerCase().includes('not been used'))) {
        box.innerHTML = diagCard('error', '❌ YouTube Data API v3 Not Enabled (403)',
          `The YouTube Data API v3 is not enabled in your Google Cloud project.<br><br>
          <strong>Fix:</strong> Go to <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank" style="color:#3B82F6;">Cloud Console → Library → YouTube Data API v3</a> → click <strong>Enable</strong>, then wait ~1 minute.`);

      } else if (code === 403) {
        box.innerHTML = diagCard('error', `❌ Access Forbidden (403)`,
          `YouTube rejected the request. Most likely cause: HTTP referrer restriction or API not enabled.<br><br>
          <strong>Error detail:</strong> <code style="background:#1a1a1a;padding:2px 6px;border-radius:4px;color:#ff6b6b;">${escHtml(msg)}</code><br><br>
          Check that: (1) YouTube Data API v3 is enabled, (2) Key has no referrer restriction blocking <strong>${location.origin}</strong>`);

      } else if (code === 400) {
        box.innerHTML = diagCard('error', '❌ Bad API Key (400)',
          `YouTube does not recognise this key. It may be incorrect or from a different project.<br><br>
          <strong>Error:</strong> <code style="background:#1a1a1a;padding:2px 6px;border-radius:4px;color:#ff6b6b;">${escHtml(msg)}</code><br><br>
          Double-check you copied the full key from <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#3B82F6;">Cloud Console → Credentials</a>.`);

      } else if (code === 429 || status === 'RESOURCE_EXHAUSTED') {
        box.innerHTML = diagCard('warn', '⚠️ Quota Exhausted (429)',
          `The key is valid and working, but its daily quota (10,000 units) is used up. It resets at midnight Pacific Time.<br><br>
          <strong>Options:</strong> Wait for reset, add another key, or <a href="https://console.cloud.google.com/apis/api/youtube.googleapis.com/quotas" target="_blank" style="color:#3B82F6;">request a quota increase</a>.`);

      } else {
        box.innerHTML = diagCard('error', `❌ API Error ${code}`,
          `<strong>Status:</strong> ${escHtml(status)}<br><strong>Message:</strong> ${escHtml(msg)}`);
      }

    } else if (data.items && data.items.length > 0) {
      const sample = data.items[0].snippet;
      box.innerHTML = diagCard('success', '✅ Key Working Perfectly!',
        `Got <strong>${data.items.length} videos</strong> back from YouTube successfully.<br>
        <strong>Sample:</strong> "${escHtml(sample.title)}" by ${escHtml(sample.channelTitle)}<br><br>
        If data is still not loading on the dashboard, go to <strong>Admin → API Keys</strong> and make sure this key is saved and active there.`);

    } else {
      box.innerHTML = diagCard('warn', '⚠️ Key Works But No Results',
        `The API responded without error but returned 0 videos. This can happen if the key is newly created and still propagating. Try again in 1–2 minutes.`);
    }

  } catch (err) {
    box.innerHTML = diagCard('error', '❌ Network Error — Cannot Reach YouTube',
      `The browser could not connect to the YouTube API at all.<br><br>
      <strong>Error:</strong> <code style="background:#1a1a1a;padding:2px 6px;border-radius:4px;color:#ff6b6b;">${escHtml(err.message)}</code><br><br>
      This usually means a network/firewall issue, not the key. Try on a different network or check browser DevTools (F12 → Network tab) for the exact error.`);
  }
}

function diagCard(type, title, body) {
  const colors = {
    success: { bg:'rgba(0,212,106,.08)',  border:'rgba(0,212,106,.3)',  title:'#00C853' },
    warn:    { bg:'rgba(255,215,0,.07)',   border:'rgba(255,215,0,.25)', title:'#FFD700' },
    error:   { bg:'rgba(255,31,31,.08)',   border:'rgba(255,31,31,.3)',  title:'#FF6B6B' },
    info:    { bg:'rgba(59,130,246,.08)',  border:'rgba(59,130,246,.3)', title:'#3B82F6' },
  };
  const c = colors[type] || colors.info;
  return `
    <div style="padding:16px 18px;background:${c.bg};border:1px solid ${c.border};border-radius:10px;margin-top:4px;">
      <div style="font-weight:700;color:${c.title};margin-bottom:8px;font-size:14px;">${title}</div>
      <div style="font-size:13px;color:#999;line-height:1.7;">${body}</div>
    </div>`;
}

function initHourlyChart() {
  const ctx = document.getElementById('hourlyChart')?.getContext('2d');
  if (!ctx) return;
  const labels = Array.from({length:24},(_,i)=>i+':00');
  const colors = ['#FF1F1F','#3B82F6','#F97316'];
  STATE.charts.hourly = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: STATE.apiKeys.map((k,i) => ({
        label: k.name,
        data: Array.from({length:24},()=>Math.floor(Math.random()*600)),
        borderColor: colors[i], backgroundColor: colors[i]+'15',
        borderWidth:2, fill:true, tension:.4, pointRadius:0, pointHoverRadius:4,
      }))
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{color:'#666',font:{size:11}} }, tooltip:{ mode:'index', intersect:false, callbacks:{ label:c=>` ${fmtNum(c.raw)} units` } } },
      scales:{
        x:{grid:{color:'#181818'},ticks:{color:'#555',maxTicksLimit:12}},
        y:{grid:{color:'#181818'},ticks:{color:'#555',callback:v=>fmtNum(v)}}
      }
    }
  });
}

let _logKeyFilter = '', _logStatusFilter = '';
function filterLogs(keyId) { _logKeyFilter = keyId; applyLogFilter(); }
function filterLogStatus(status) { _logStatusFilter = status; applyLogFilter(); }
function applyLogFilter() {
  let logs = STATE.logs;
  if (_logKeyFilter) logs = logs.filter(l=>String(l.keyId)===_logKeyFilter);
  if (_logStatusFilter) logs = logs.filter(l=>l.status===_logStatusFilter);
  document.getElementById('logBody').innerHTML = renderLogRows(logs);
}
function renderLogRows(logs) {
  const statusMap = { success:'badge-ok', error:'badge-err', quota_exceeded:'badge-warn' };
  return logs.map(l=>`
    <tr>
      <td style="color:var(--muted);font-family:'Space Mono',monospace;">${l.id}</td>
      <td style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);">${new Date(l.ts).toLocaleTimeString()} <span style="opacity:.5">${new Date(l.ts).toLocaleDateString()}</span></td>
      <td><span style="font-size:11px;">${escHtml(l.keyName)}</span></td>
      <td style="color:var(--blue);font-family:'Space Mono',monospace;font-size:11px;">${l.action}</td>
      <td><span style="background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:11px;">${l.region}</span></td>
      <td style="font-family:'Space Mono',monospace;font-size:11px;">${l.units}</td>
      <td><span class="status-badge ${statusMap[l.status]||'badge-skip'}">${l.status.replace('_',' ')}</span></td>
    </tr>
  `).join('');
}

function renderUsers() {
  const avatarColors = ['var(--red)','var(--blue)','var(--green)','var(--purple)','var(--orange)','#EC4899'];
  const USER_LIMIT = 3;
  const today = new Date().toDateString();

  // Merge tp_users_db call data with STATE.users display data
  const usersDb = JSON.parse(localStorage.getItem('tp_users_db') || '{}');

  // Merge registered users from usersDb into STATE.users for display
  const allEmails = new Set([...STATE.users.map(u=>u.email), ...Object.keys(usersDb)]);
  const mergedUsers = [...allEmails].map(email => {
    const base = STATE.users.find(u=>u.email===email) || {};
    const db   = usersDb[email] || {};
    const callsToday = db.calls?.[today] || 0;
    return {
      id:     base.id || email,
      username: base.username || db.username || email.split('@')[0],
      email,
      region: base.region || '–',
      joined: base.joined || (db.joinedAt ? db.joinedAt.split('T')[0] : '–'),
      lastLogin: base.lastLogin || '–',
      bookmarks: base.bookmarks || 0,
      status: base.status || (db.username ? 'active' : 'active'),
      callsToday,
      blocked: callsToday >= USER_LIMIT,

  const activeCount = mergedUsers.filter(u=>!u.blocked).length;

      <div class="stat-card"><div class="stat-icon-wrap" style="background:rgba(59,130,246,.08);">⚡</div><div class="stat-num">${USER_LIMIT}</div><div class="stat-lbl">CALLS/USER/DAY</div></div>
    </div>
    <div class="panel grid-full">
      <div class="ph">
        <div class="pt">👥 USER LIST</div>
        <input placeholder="Search users..." oninput="searchUsers(this.value)" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;outline:none;min-width:200px;">
      </div>
      <div style="overflow-x:auto;">
        <table class="users-table" id="usersTable">
          <thead>
            <tr><th>USER</th><th>EMAIL</th><th>REGION</th><th>JOINED</th><th>CALLS TODAY</th><th>STATUS</th><th>ACTION</th></tr>
          </thead>
          <tbody id="usersBody">
            ${mergedUsers.map((u,i)=>`
              <tr>
                <td>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <div class="u-av" style="background:${avatarColors[i%avatarColors.length]}">${u.username[0].toUpperCase()}</div>
                    <span style="font-weight:600;">${escHtml(u.username)}</span>
                  </div>
                </td>
                <td style="color:var(--muted);font-size:11px;">${escHtml(u.email)}</td>
                <td><span style="background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:11px;">${u.region}</span></td>
                <td style="font-size:11px;color:var(--muted);">${u.joined}</td>

function searchUsers(q) {
  const rows = document.querySelectorAll('#usersTable tbody tr');
  rows.forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}
function toggleUserStatus(email) {
  const db = JSON.parse(localStorage.getItem('tp_users_db') || '{}');
  if (db[email]) {
    db[email].suspended = !db[email].suspended;
    localStorage.setItem('tp_users_db', JSON.stringify(db));
    toast(`${email} ${db[email].suspended ? 'suspended' : 'activated'}`, 'i');
    renderUsers();
  }
}
function resetUserCalls(email) {
  const db = JSON.parse(localStorage.getItem('tp_users_db') || '{}');
  if (db[email]) {
    const today = new Date().toDateString();
    if (db[email].calls) db[email].calls[today] = 0;
    localStorage.setItem('tp_users_db', JSON.stringify(db));
    toast(`${email} unblocked — calls reset`, 's');
    renderUsers();
  }
}

// ─── FETCH ENGINE ───
async function startPrefetch() {
  const activeKeys = STATE.apiKeys.filter(k => k.status !== 'disabled' && isRealKey(k.value));
  if (!activeKeys.length) { toast('Add valid API keys first', 'e'); return; }

  const region  = document.getElementById('prefetchRegion').value;
  const maxVids = parseInt(document.getElementById('prefetchMax').value);
  FETCH_ABORT   = false;

  // ── Pre-flight: test that the key and network actually work ──
  document.getElementById('fetchStatusText').textContent = 'Testing API connection...';
  document.getElementById('fetchProgress').style.display = 'block';
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('fetchBtn').textContent = '⏳ Fetching...';

  try {
    const testUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=1&hl=en&key=${activeKeys[0].value}`;
    const testResp = await fetch(testUrl);
    const testData = await testResp.json();
    if (testData.error) {
      const code = testData.error.code;
      const msg  = testData.error.message || '';
      if (code === 403 || code === 429) {
        toast('API key quota exceeded. Add another key or wait 24h.', 'e');
      } else if (code === 400) {
        toast('API key rejected (400). Check the key in API Keys section.', 'e');
      } else {
        toast('API error: ' + msg, 'e');
      }
      document.getElementById('fetchBtn').disabled = false;
      document.getElementById('fetchBtn').textContent = '🚀 Fetch All Categories';
      document.getElementById('fetchProgress').style.display = 'none';
      return;
    }
    console.log('[Admin] Pre-flight OK — API key works, items:', testData.items?.length);
  } catch (preflightErr) {
    toast('Cannot reach YouTube API. Check your internet connection.', 'e');
    console.error('[Admin] Pre-flight failed:', preflightErr);
    document.getElementById('fetchBtn').disabled = false;
    document.getElementById('fetchBtn').textContent = '🚀 Fetch All Categories';
    document.getElementById('fetchProgress').style.display = 'none';
    return;
  }

  document.getElementById('fetchStatusText').textContent = 'Starting fetch...';

  // Init category pill grid
  const grid = document.getElementById('fetchCatGrid');
  grid.innerHTML = PREFETCH_CATS.map(cat => `
    <div id="pill_${cat.id||'all'}" style="background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;display:flex;align-items:center;gap:6px;transition:all .3s;">
      <span id="pill_icon_${cat.id||'all'}" style="font-size:14px;">⏳</span>
      <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${cat.name}</span>
    </div>
  `).join('');

  let keyIndex = 0;
  const result = { region, fetchedAt: new Date().toISOString(), categories: {} };

  for (let i = 0; i < PREFETCH_CATS.length; i++) {
    if (FETCH_ABORT) { toast('Fetch stopped', 'i'); break; }

    const cat = PREFETCH_CATS[i];
    const pillId = cat.id || 'all';

    // Update progress bar
    const pct = Math.round((i / PREFETCH_CATS.length) * 100);
    document.getElementById('fetchBar').style.width = pct + '%';
    document.getElementById('fetchCounter').textContent = `${i} / ${PREFETCH_CATS.length}`;
    document.getElementById('fetchStatusText').textContent = `Fetching: ${cat.icon} ${cat.name}...`;
    setPillState(pillId, 'loading', cat.icon);

    try {
      let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${region}&maxResults=${maxVids}&hl=en_US`;
      if (cat.id) url += `&videoCategoryId=${cat.id}`;

      const data = await adminFetchWithRotation(url, activeKeys, keyIndex);
      keyIndex = data._keyIndex;

      const videos = (data.items || []).map((item, idx) => ({
        id:          item.id,
        title:       item.snippet.title,
        channel:     item.snippet.channelTitle,
        thumbnail:   item.snippet.thumbnails.maxres?.url || item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || '',
        views:       parseInt(item.statistics?.viewCount  || 0),
        likes:       parseInt(item.statistics?.likeCount  || 0),
        comments:    parseInt(item.statistics?.commentCount || 0),
        duration:    adminFmtDuration(item.contentDetails?.duration),
        durationSec: adminParseDurSec(item.contentDetails?.duration),
        categoryId:  item.snippet.categoryId,
        publishedAt: item.snippet.publishedAt,
        url:         `https://www.youtube.com/watch?v=${item.id}`,
        rank:        idx + 1,
      }));

      result.categories[cat.id] = videos;
      setPillState(pillId, 'done', cat.icon, videos.length);

      // Track units used on admin key
      const usedKey = activeKeys[keyIndex % activeKeys.length];
      const adminKey = STATE.apiKeys.find(k => k.value === usedKey?.value);
      if (adminKey) { adminKey.used += 100; adminKey.requests += 1; adminKey.lastUsed = new Date().toISOString(); }

    } catch (err) {
      result.categories[cat.id] = [];
      setPillState(pillId, 'error', cat.icon);
      console.error('[Admin Prefetch] Category failed:', cat.name, err);
      const msg = err.message || 'Unknown error';
      toast(`${cat.name}: ${msg}`, 'e');
    }

    // Small delay to avoid hammering API
    await new Promise(r => setTimeout(r, 300));
  }

  if (!FETCH_ABORT) {
    // Save to localStorage for user dashboard
    localStorage.setItem('tp_prefetch_cache', JSON.stringify(result));
    saveKeys(); // update quota counters

    document.getElementById('fetchBar').style.width = '100%';
    document.getElementById('fetchCounter').textContent = `${PREFETCH_CATS.length} / ${PREFETCH_CATS.length}`;
    document.getElementById('fetchStatusText').innerHTML = '<span style="color:var(--green);">✓ All categories fetched and cached!</span>';
    document.getElementById('abortBtn').style.display = 'none';

    setTimeout(() => {
      toast(`✓ ${Object.keys(result.categories).length} categories cached for ${region}!`, 's');
      updateCacheCount();
      renderPrefetch();
    }, 800);
  }

  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('fetchBtn').textContent = '📡 Fetch All Categories';
}

function abortPrefetch() {
  FETCH_ABORT = true;
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('fetchBtn').textContent = '📡 Fetch All Categories';
}

function clearCache() {
  if (!confirm('Clear the pre-fetched cache? Users will see demo data until you fetch again.')) return;
  localStorage.removeItem('tp_prefetch_cache');
  updateCacheCount();
  toast('Cache cleared', 'i');
  renderPrefetch();
}

function setPillState(id, state, icon, count) {
  const pill = document.getElementById('pill_' + id);
  const iconEl = document.getElementById('pill_icon_' + id);
  if (!pill || !iconEl) return;
  if (state === 'loading') {
    pill.style.borderColor = 'var(--orange)';
    iconEl.textContent = '⟳';
  } else if (state === 'done') {
    pill.style.borderColor = 'var(--green)';
    pill.style.background  = 'rgba(0,212,106,.05)';
    iconEl.textContent = icon;
    if (count !== undefined) {
      const span = pill.querySelector('span:last-child');
      if (span) span.textContent += ` (${count})`;
    }
  } else if (state === 'error') {
    pill.style.borderColor = 'var(--red)';
    pill.style.background  = 'rgba(255,31,31,.05)';
    iconEl.textContent = '✕';
  }
}

async function adminFetchWithRotation(url, keys, startIndex) {
  let lastErr = 'Unknown error';

  for (let attempt = 0; attempt < keys.length; attempt++) {
    const idx = (startIndex + attempt) % keys.length;
    const key = keys[idx].value;
    // key appended cleanly — URL already has ?params
    const full = url + '&key=' + key;

    let resp, data;
    try {
      resp = await fetch(full, { method: 'GET' });
    } catch (netErr) {
      lastErr = 'Network error: ' + netErr.message;
      console.error('[Admin] Network error:', netErr);
      continue;
    }

    try {
      data = await resp.json();
    } catch (parseErr) {
      lastErr = 'Bad response (HTTP ' + resp.status + ')';
      continue;
    }

    if (data.error) {
      const code   = data.error.code;
      const status = (data.error.status  || '').toUpperCase();
      const msg    = (data.error.message || '').toLowerCase();
      console.warn('[Admin] API error:', code, status, msg);

      // Quota / rate limit / forbidden — rotate
      if (code === 403 || code === 429 ||
          status === 'RESOURCE_EXHAUSTED' || status === 'FORBIDDEN' ||
          msg.includes('quota') || msg.includes('forbidden') || msg.includes('rate')) {
        lastErr = 'quota';
        continue;
      }
      // Bad key / bad request — skip key
      if (code === 400 || code === 401) {
        lastErr = msg || `HTTP ${code}`;
        continue;
      }
      throw new Error(data.error.message || `API error ${code}`);
    }

    data._keyIndex = idx;
    return data;
  }

  throw new Error(lastErr === 'quota' ? 'All API keys quota exhausted' : lastErr);
}

function adminFmtDuration(iso) {
  if (!iso) return '0:00';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  const h = parseInt(m?.[1]||0), mi = parseInt(m?.[2]||0), s = parseInt(m?.[3]||0);
  return h > 0 ? `${h}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${mi}:${String(s).padStart(2,'0')}`;
}

function adminParseDurSec(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  return parseInt(m?.[1]||0)*3600 + parseInt(m?.[2]||0)*60 + parseInt(m?.[3]||0);
}

// KEY MODAL
// ═══════════════════════════════════════════════
function openAddKeyModal() {
  STATE.editingKeyId = null;
  document.getElementById('modalTitle').textContent = 'ADD API KEY';
  document.getElementById('modalSub').textContent = 'Add a new YouTube Data API v3 key to the rotation pool';
  document.getElementById('mKeyName').value = '';
  document.getElementById('mKeyValue').value = '';
  document.getElementById('mKeyPriority').value = '1';
  document.getElementById('mKeyQuota').value = '10000';
  document.getElementById('keyModal').classList.add('open');
}

function openEditKeyModal(id) {
  const k = STATE.apiKeys.find(x=>x.id===id);
  if (!k) return;
  STATE.editingKeyId = id;
  document.getElementById('modalTitle').textContent = 'EDIT API KEY';
  document.getElementById('modalSub').textContent = 'Update the key details';
  document.getElementById('mKeyName').value = k.name;
  document.getElementById('mKeyValue').value = k.value;
  document.getElementById('mKeyPriority').value = k.priority;
  document.getElementById('mKeyQuota').value = k.quota;
  document.getElementById('keyModal').classList.add('open');
}

function closeModal() { document.getElementById('keyModal').classList.remove('open'); }

function saveKey() {
  const name     = document.getElementById('mKeyName').value.trim();
  const value    = document.getElementById('mKeyValue').value.trim();
  const priority = parseInt(document.getElementById('mKeyPriority').value);
  const quota    = parseInt(document.getElementById('mKeyQuota').value);

  if (!name || !value) { toast('Fill in all fields', 'e'); return; }
  if (!value.startsWith('AIza')) { toast('API key must start with "AIza"', 'e'); return; }
  if (value.length < 30)         { toast('API key looks too short — check it', 'e'); return; }

  if (STATE.editingKeyId) {
    const k = STATE.apiKeys.find(x => x.id === STATE.editingKeyId);
    if (k) { k.name = name; k.value = value; k.priority = priority; k.quota = quota; }
    toast('Key updated!', 's');
  } else {
    const newId = Math.max(0, ...STATE.apiKeys.map(k => k.id)) + 1;
    STATE.apiKeys.push({
      id: newId, name, value, priority, quota,
      used: 0, status: 'active', requests: 0, errors: 0,
      lastUsed: new Date().toISOString(),
      addedAt: new Date().toISOString().split('T')[0],
    });
    toast('Key added!', 's');
  }

  saveKeys(); // persists to admin_api_keys AND syncs real keys to tp_api_keys
  closeModal();
  renderApiKeys();
}

function toggleReveal(id) {
  const k = STATE.apiKeys.find(x=>x.id===id);
  if (!k) return;
  const el = document.getElementById('keyval'+id);
  if (!el) return;
  if (el.dataset.revealed === '1') {
    el.textContent = k.value.substring(0,8)+'••••••••'+k.value.slice(-4);
    el.dataset.revealed = '0';
  } else {
    el.textContent = k.value;
    el.dataset.revealed = '1';
    navigator.clipboard.writeText(k.value).catch(()=>{});
    toast('Key revealed & copied!', 'i');
  }
}

function resetQuota(id) {
  const k = STATE.apiKeys.find(x=>x.id===id);
  if (!k || !confirm(`Reset quota for "${k.name}"?`)) return;
  k.used = 0;
  k.status = 'active';
  saveKeys();
  renderApiKeys();
  toast(`Quota reset for ${k.name}`, 's');
}

function toggleKeyStatus(id) {
  const k = STATE.apiKeys.find(x=>x.id===id);
  if (!k) return;
  k.status = k.status === 'disabled' ? 'active' : 'disabled';
  saveKeys();
  renderApiKeys();
  toast(`${k.name} ${k.status}`, 'i');
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n||0);
}
function timeSince(iso) {
  const s = Math.floor((Date.now() - new Date(iso))/1000);
  if (s < 60) return s+'s ago';
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, type='i') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${{s:'✓',e:'✕',i:'ℹ'}[type]||'ℹ'}</span>${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.classList.add('show'), 40);
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3200);
}
function exportData() {
  const data = { keys: STATE.apiKeys, users: STATE.users, logs: STATE.logs, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trendpulse_admin_export.json';
  a.click();
  toast('Export downloaded!', 's');
}
function logout() {
  localStorage.removeItem('tp_token');
  localStorage.removeItem('tp_user');
  window.location.href = 'index.html';
}

// Close modal on backdrop
document.getElementById('keyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('keyModal')) closeModal();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
