<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{font-family:'DM Sans',sans-serif;color:#fff;cursor:none;}

/* ── CUSTOM CURSOR ── */
.cursor{
  position:fixed;width:10px;height:10px;
  background:#FF1F1F;border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform .08s,width .2s,height .2s,background .2s;
  mix-blend-mode:difference;
}
.cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1.5px solid rgba(255,31,31,.5);border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:transform .18s cubic-bezier(.16,1,.3,1),width .3s,height .3s,opacity .3s;
}

/* ── STAGE ── */
#stage{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 120% 120% at 50% -10%, #0d0000 0%, #000 55%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;
}

/* ── CANVAS FULL BG ── */
#bgCanvas{position:absolute;inset:0;z-index:0;}

/* ── NOISE GRAIN ── */
#stage::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/%3E%3C/svg%3E");
  animation:grainShift 1s steps(2) infinite;
}
@keyframes grainShift{0%{transform:translate(0,0);}25%{transform:translate(-1%,-1%);}50%{transform:translate(1%,0);}75%{transform:translate(0,1%);}100%{transform:translate(0,0);}}

/* ── SCANLINES ── */
.scanlines{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 1px,transparent 1px,transparent 3px);
}

/* ── MAIN CONTENT ── */
.intro-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;}

/* ── LOGO MARK ── */
.logo-mark{
  position:relative;width:100px;height:100px;margin-bottom:36px;
  opacity:0;transform:scale(.5);
  animation:markReveal .9s .3s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes markReveal{
  0%  {opacity:0;transform:scale(.4) rotate(-15deg);}
  60% {opacity:1;transform:scale(1.08) rotate(3deg);}
  100%{opacity:1;transform:scale(1) rotate(0deg);}
}
.mark-ring{
  position:absolute;inset:-12px;border-radius:50%;
  border:1px solid rgba(255,31,31,.25);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.mark-ring-2{
  position:absolute;inset:-24px;border-radius:50%;
  border:1px solid rgba(255,31,31,.1);
  animation:ringPulse 2.5s .4s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.08);opacity:1;}
}
.mark-inner{
  width:100%;height:100%;border-radius:24px;
  background:linear-gradient(145deg,#1a0000,#0d0000);
  border:1px solid rgba(255,31,31,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;line-height:1;
  box-shadow:0 0 40px rgba(255,31,31,.25),0 0 80px rgba(255,31,31,.1),inset 0 1px 0 rgba(255,100,100,.15);
  position:relative;overflow:hidden;
}
.mark-inner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);
}

/* ── WORDMARK ── */
.wordmark{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,10vw,120px);
  letter-spacing:12px;
  line-height:1;
  display:flex;align-items:center;
  gap:0;overflow:hidden;
  margin-bottom:16px;
}
.wm-char{
  display:inline-block;
  opacity:0;transform:translateY(80px) skewY(4deg);
  animation:charReveal .55s cubic-bezier(.16,1,.3,1) forwards;
}
.wm-char.accent{
  color:#FF1F1F;
  text-shadow:0 0 30px rgba(255,31,31,.6),0 0 60px rgba(255,31,31,.2);
}
@keyframes charReveal{to{opacity:1;transform:translateY(0) skewY(0);}}

/* ── TAGLINE ── */
.tagline{
  font-family:'Space Mono',monospace;
  font-size:10px;letter-spacing:5px;
  color:rgba(255,255,255,.25);
  opacity:0;
  animation:fadeInUp .6s 1.4s ease forwards;
  display:flex;align-items:center;gap:14px;
  margin-bottom:52px;
}
.tagline::before,.tagline::after{
  content:'';height:1px;width:50px;
  background:linear-gradient(90deg,transparent,rgba(255,31,31,.4));
}
.tagline::after{transform:rotate(180deg);}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── LIVE COUNTER STRIP ── */
.counter-strip{
  display:flex;gap:0;
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;overflow:hidden;
  opacity:0;
  animation:fadeInUp .5s 1.7s ease forwards;
  backdrop-filter:blur(8px);
  background:rgba(255,255,255,.02);
  margin-bottom:48px;
}
.cs-item{
  padding:18px 28px;text-align:center;
  border-right:1px solid rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.cs-item:last-child{border-right:none;}
.cs-item::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--c,#FF1F1F),transparent);
  transform:scaleX(0);transform-origin:left;
  animation:barSlide .6s ease forwards;
  animation-delay:var(--d,2s);
}
@keyframes barSlide{to{transform:scaleX(1);}}
.cs-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;letter-spacing:1px;line-height:1;
  color:var(--c,#FF1F1F);
  display:block;margin-bottom:4px;
}
.cs-lbl{
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.3);
}

/* ── WAVEFORM ── */
.waveform{
  display:flex;align-items:center;gap:3px;
  height:40px;margin-bottom:52px;
  opacity:0;animation:fadeInUp .5s 1.9s ease forwards;
}
.wave-bar{
  width:3px;border-radius:3px;
  background:linear-gradient(to top,rgba(255,31,31,.8),rgba(255,107,53,.4));
  animation:waveBounce var(--dur,.6s) var(--delay,0s) ease-in-out infinite alternate;
}
@keyframes waveBounce{from{transform:scaleY(.15);}to{transform:scaleY(1);}}

/* ── ENTER BUTTON ── */
.enter-btn{
  position:relative;
  font-family:'Bebas Neue',sans-serif;
  font-size:15px;letter-spacing:4px;
  color:#fff;background:transparent;border:none;
  cursor:none;padding:16px 44px;
  opacity:0;
  animation:fadeInUp .5s 2.2s ease forwards;
}
.enter-btn::before{
  content:'';position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.15);
  border-radius:4px;
  transition:border-color .3s,box-shadow .3s;
}
.enter-btn:hover::before{
  border-color:rgba(255,31,31,.7);
  box-shadow:0 0 24px rgba(255,31,31,.2),inset 0 0 24px rgba(255,31,31,.04);
}
.enter-btn .btn-fill{
  position:absolute;inset:0;border-radius:4px;
  background:linear-gradient(90deg,#FF1F1F,#FF6B35);
  transform:scaleX(0);transform-origin:left;
  transition:transform .35s cubic-bezier(.16,1,.3,1);
  z-index:-1;
}
.enter-btn:hover .btn-fill{transform:scaleX(1);}
.enter-btn .btn-text{position:relative;z-index:1;transition:letter-spacing .3s;}
.enter-btn:hover .btn-text{letter-spacing:6px;}

/* ── CORNER DECORATIONS ── */
.corner{position:absolute;z-index:5;pointer-events:none;}
.corner svg{display:block;}
.corner-tl{top:28px;left:28px;}
.corner-tr{top:28px;right:28px;transform:scaleX(-1);}
.corner-bl{bottom:28px;left:28px;transform:scaleY(-1);}
.corner-br{bottom:28px;right:28px;transform:scale(-1);}
.corner-line{
  stroke:rgba(255,31,31,.25);stroke-width:1;fill:none;
  stroke-dasharray:40;stroke-dashoffset:40;
  animation:drawLine .8s cubic-bezier(.16,1,.3,1) forwards;
  animation-delay:var(--delay,.5s);
}
@keyframes drawLine{to{stroke-dashoffset:0;}}

/* ── STATUS BAR ── */
.status-bar{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:10;
  display:flex;align-items:center;gap:12px;
  opacity:0;animation:fadeInUp .4s 2s ease forwards;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;background:#FF1F1F;
  animation:statusPulse 1.2s ease-in-out infinite;
}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.6);}}
.status-text{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:2px;color:rgba(255,255,255,.2);
}

/* ── HORIZONTAL LINES ── */
.h-line-top,.h-line-bot{
  position:absolute;left:0;right:0;height:1px;z-index:5;
  background:linear-gradient(90deg,transparent,rgba(255,31,31,.2),transparent);
  opacity:0;animation:fadeInUp .6s ease forwards;
}
.h-line-top{top:80px;animation-delay:.8s;}
.h-line-bot{bottom:80px;animation-delay:1s;}

/* ── GLITCH TITLE EFFECT ── */
@keyframes glitch1{
  0%,90%,100%{clip-path:none;transform:none;}
  91%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);transform:translate(-3px,0);}
  92%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translate(3px,0);}
  93%{clip-path:none;transform:none;}
}
.wordmark{animation:glitch1 8s 3s ease-in-out infinite;}

/* ── TRANSITION OUT ── */
.reveal-split-top,.reveal-split-bot{
  position:fixed;left:0;right:0;z-index:200;
  background:#000;
  transition:transform .7s cubic-bezier(.7,0,.3,1);
}
.reveal-split-top{top:0;height:50%;transform:translateY(0);}
.reveal-split-bot{bottom:0;height:50%;transform:translateY(0);}
.reveal-split-top.exit{transform:translateY(-100%);}
.reveal-split-bot.exit{transform:translateY(100%);}

/* ── FLASH ── */
.exit-flash{
  position:fixed;inset:0;z-index:190;
  background:#FF1F1F;opacity:0;pointer-events:none;
  transition:opacity .06s;
}
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Split panels for exit -->
<div class="reveal-split-top" id="splitTop"></div>
<div class="reveal-split-bot" id="splitBot"></div>
<div class="exit-flash" id="exitFlash"></div>

<!-- Main stage -->
<div id="stage">
  <canvas id="bgCanvas"></canvas>
  <div class="scanlines"></div>

  <!-- Corner brackets -->
  <div class="corner corner-tl">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <polyline class="corner-line" points="48,4 4,4 4,48" style="--delay:.4s"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <polyline class="corner-line" points="48,4 4,4 4,48" style="--delay:.5s"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <polyline class="corner-line" points="48,4 4,4 4,48" style="--delay:.6s"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <polyline class="corner-line" points="48,4 4,4 4,48" style="--delay:.7s"/>
    </svg>
  </div>

  <div class="h-line-top"></div>
  <div class="h-line-bot"></div>

  <!-- Center content -->
  <div class="intro-center">

    <!-- Logo mark -->
    <div class="logo-mark">
      <div class="mark-ring"></div>
      <div class="mark-ring-2"></div>
      <div class="mark-inner">🔥</div>
    </div>

    <!-- Wordmark -->
    <div class="wordmark" id="wordmark"></div>

    <!-- Tagline -->
    <div class="tagline">YOUTUBE TRENDS ANALYZER</div>

    <!-- Counter strip -->
    <div class="counter-strip">
      <div class="cs-item" style="--c:#FF1F1F;--d:2.1s">
        <span class="cs-num" id="ctr1">0</span>
        <span class="cs-lbl">REGIONS</span>
      </div>
      <div class="cs-item" style="--c:#FF6B35;--d:2.3s">
        <span class="cs-num" id="ctr2">0</span>
        <span class="cs-lbl">CATEGORIES</span>
      </div>
      <div class="cs-item" style="--c:#FFD700;--d:2.5s">
        <span class="cs-num" id="ctr3">0</span>
        <span class="cs-lbl">CREATORS</span>
      </div>
      <div class="cs-item" style="--c:#00D46A;--d:2.7s">
        <span class="cs-num" id="ctr4">100%</span>
        <span class="cs-lbl">REAL DATA</span>
      </div>
    </div>

    <!-- Waveform -->
    <div class="waveform" id="waveform"></div>

    <!-- Enter button -->
    <button class="enter-btn" id="enterBtn" onclick="launchSite()">
      <div class="btn-fill"></div>
      <span class="btn-text">ENTER TRENDPULSE</span>
    </button>

  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">LIVE · YOUTUBE DATA API V3 · REAL-TIME</div>
  </div>

</div>

<script>
// ── CURSOR ──
const cur = document.getElementById('cursor');
const ring= document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
(function animCursor(){
  rx += (mx-rx)*.14; ry += (my-ry)*.14;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animCursor);
})();
document.addEventListener('mousedown',()=>{
  cur.style.transform='translate(-50%,-50%) scale(.5)';
  ring.style.transform='translate(-50%,-50%) scale(1.6)';
  ring.style.opacity='.4';
});
document.addEventListener('mouseup',()=>{
  cur.style.transform='translate(-50%,-50%) scale(1)';
  ring.style.transform='translate(-50%,-50%) scale(1)';
  ring.style.opacity='1';
});
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cur.style.width='20px'; cur.style.height='20px';
    ring.style.width='60px'; ring.style.height='60px';
  });
  el.addEventListener('mouseleave',()=>{
    cur.style.width='10px'; cur.style.height='10px';
    ring.style.width='36px'; ring.style.height='36px';
  });
});

// ── WORDMARK ANIMATION ──
const WORD = 'TRENDPULSE';
const wm = document.getElementById('wordmark');
[...WORD].forEach((ch,i)=>{
  const s=document.createElement('span');
  s.className='wm-char'+(i>=5?' accent':'');
  s.textContent=ch;
  s.style.animationDelay=(.5+i*.07)+'s';
  wm.appendChild(s);
});

// ── WAVEFORM ──
const wf=document.getElementById('waveform');
const HEIGHTS=[16,28,38,30,22,40,34,24,38,28,18,34,40,26,20,36,30,22,38,28,16,32,40,24];
HEIGHTS.forEach((h,i)=>{
  const b=document.createElement('div');
  b.className='wave-bar';
  b.style.height=h+'px';
  b.style.setProperty('--dur',(0.4+Math.random()*.6)+'s');
  b.style.setProperty('--delay',(Math.random()*.8)+'s');
  wf.appendChild(b);
});

// ── COUNTER ANIMATIONS ──
function animateCount(el, target, dur, suffix=''){
  const start=performance.now();
  const isFloat=target%1!==0;
  (function tick(t){
    const prog=Math.min((t-start)/dur,1);
    // easeOutExpo
    const ease=prog===1?1:1-Math.pow(2,-10*prog);
    const v=isFloat?(ease*target).toFixed(1):Math.round(ease*target);
    el.textContent=v+suffix;
    if(prog<1)requestAnimationFrame(tick);
  })(start);
}
setTimeout(()=>animateCount(document.getElementById('ctr1'),30,1200,'+'),1800);
setTimeout(()=>animateCount(document.getElementById('ctr2'),15,1000),2000);
setTimeout(()=>animateCount(document.getElementById('ctr3'),75,1300,'+'),2200);

// ── STATUS TEXT CYCLE ──
const STATUS=[
  'LIVE · YOUTUBE DATA API V3 · REAL-TIME',
  'TRACKING 30+ REGIONS WORLDWIDE',
  '15 CATEGORIES · VIDEOS + SHORTS',
  'CONNECTING TO YOUTUBE DATA FEED',
  'ANALYZING TRENDING CONTENT NOW',
];
let si=0;
setInterval(()=>{
  si=(si+1)%STATUS.length;
  const el=document.getElementById('statusText');
  if(el){
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=STATUS[si];el.style.transition='opacity .4s';el.style.opacity='1';},200);
  }
},2800);

// ── BG CANVAS — Multi-layer animated universe ──
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// Stars
const stars=Array.from({length:180},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*.8+.15,
  o:Math.random()*.4+.05,
  pulse:Math.random()*Math.PI*2,
  speed:Math.random()*.015+.005,
}));

// Shooting stars
const shooters=[];
function spawnShooter(){
  shooters.push({
    x:Math.random()*W,y:Math.random()*H*.4,
    vx:(Math.random()*4+3)*(Math.random()<.5?1:-1),
    vy:Math.random()*2+1,
    life:1,len:Math.random()*60+40,
  });
}
setInterval(spawnShooter,1800);

// Data rings emanating from center
const rings=[];
function spawnRing(){
  rings.push({r:0,maxR:Math.min(W,H)*.7,o:.3,color:Math.random()<.6?'255,31,31':'255,107,53'});
}
spawnRing();
setInterval(spawnRing,2200);

// Orbit particles (circle the center)
const orbits=Array.from({length:14},(_,i)=>({
  angle:Math.random()*Math.PI*2,
  speed:(Math.random()*.004+.002)*(Math.random()<.5?1:-1),
  radius:Math.random()*120+80,
  r:Math.random()*1.5+.5,
  o:Math.random()*.5+.2,
  c:Math.random()<.5?'#FF1F1F':Math.random()<.5?'#FF6B35':'#FFD700',
}));

// Network nodes
const nodes=Array.from({length:30},()=>({
  x:Math.random(),y:Math.random(),
  vx:(Math.random()-.5)*.0008,
  vy:(Math.random()-.5)*.0008,
  r:Math.random()*1.2+.3,
  o:Math.random()*.15+.05,
}));

// Glowing core
let coreGlow=0;

function draw(ts){
  ctx.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2;
  coreGlow=Math.sin(ts*.0012)*.5+.5;

  // Ambient gradient
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.7);
  bg.addColorStop(0,`rgba(40,0,0,${.18+coreGlow*.12})`);
  bg.addColorStop(.4,'rgba(8,0,0,.25)');
  bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    s.pulse+=s.speed;
    const pulseO=s.o*(Math.sin(s.pulse)*.4+.6);
    ctx.beginPath();
    ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${pulseO})`;
    ctx.fill();
  });

  // Network connections
  for(let i=0;i<nodes.length;i++){
    nodes[i].x=(nodes[i].x+nodes[i].vx+1)%1;
    nodes[i].y=(nodes[i].y+nodes[i].vy+1)%1;
    for(let j=i+1;j<nodes.length;j++){
      const dx=(nodes[i].x-nodes[j].x)*W;
      const dy=(nodes[i].y-nodes[j].y)*H;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<180){
        ctx.beginPath();
        ctx.moveTo(nodes[i].x*W,nodes[i].y*H);
        ctx.lineTo(nodes[j].x*W,nodes[j].y*H);
        ctx.strokeStyle=`rgba(255,31,31,${.06*(1-d/180)})`;
        ctx.lineWidth=.5; ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(nodes[i].x*W,nodes[i].y*H,nodes[i].r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,50,50,${nodes[i].o})`;
    ctx.fill();
  }

  // Emanating rings
  for(let i=rings.length-1;i>=0;i--){
    const ring=rings[i];
    ring.r+=1.8;
    ring.o=.3*(1-ring.r/ring.maxR);
    if(ring.r>ring.maxR){rings.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(cx,cy,ring.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${ring.color},${ring.o})`;
    ctx.lineWidth=1.2; ctx.stroke();
  }

  // Orbit particles
  orbits.forEach(p=>{
    p.angle+=p.speed;
    const px=cx+Math.cos(p.angle)*p.radius;
    const py=cy+Math.sin(p.angle)*p.radius;
    // Trail
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(cx+Math.cos(p.angle-p.speed*4)*p.radius,cy+Math.sin(p.angle-p.speed*4)*p.radius);
    ctx.strokeStyle=`${p.c}${Math.round(p.o*.5*255).toString(16).padStart(2,'0')}`;
    ctx.lineWidth=p.r*.8; ctx.stroke();
    ctx.beginPath();
    ctx.arc(px,py,p.r,0,Math.PI*2);
    ctx.fillStyle=p.c;
    ctx.globalAlpha=p.o;
    ctx.fill();
    ctx.globalAlpha=1;
  });

  // Shooting stars
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i];
    s.x+=s.vx; s.y+=s.vy; s.life-=.018;
    if(s.life<=0){shooters.splice(i,1);continue;}
    const grd=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*(s.len/Math.abs(s.vx)),s.y-s.vy*(s.len/Math.abs(s.vx)));
    grd.addColorStop(0,`rgba(255,255,255,${s.life*.7})`);
    grd.addColorStop(.3,`rgba(255,100,50,${s.life*.4})`);
    grd.addColorStop(1,'rgba(255,31,31,0)');
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.vx*(s.len/Math.abs(s.vx+.001)),s.y-s.vy*(s.len/Math.abs(s.vx+.001)));
    ctx.strokeStyle=grd;
    ctx.lineWidth=1.5; ctx.stroke();
  }

  // Core glow center
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,200);
  cg.addColorStop(0,`rgba(255,31,31,${.06+coreGlow*.06})`);
  cg.addColorStop(.5,`rgba(255,31,31,.015)`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ── KEYBOARD SHORTCUT ──
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' ') launchSite();
});

// ── LAUNCH ──
let launched=false;
function launchSite(){
  if(launched) return;
  launched=true;

  const flash=document.getElementById('exitFlash');
  const top  =document.getElementById('splitTop');
  const bot  =document.getElementById('splitBot');
  const btn  =document.getElementById('enterBtn');

  // Button click ripple
  btn.style.transform='scale(.96)';
  setTimeout(()=>btn.style.transform='',100);

  // Flash pulse
  flash.style.opacity='1.0';
  setTimeout(()=>flash.style.opacity='0',80);

  // 200ms pause then split panels slide out
  setTimeout(()=>{
    top.classList.add('exit');
    bot.classList.add('exit');
  },200);

  // Navigate
  setTimeout(()=>{
    window.location.href='index.html';
  },900);
}

// ── HINT: auto-suggest enter after 4s ──
setTimeout(()=>{
  const btn=document.getElementById('enterBtn');
  if(btn&&!launched){
    btn.style.animation='none';
    btn.style.opacity='1';
    // Pulse the button gently
    btn.querySelector('::before');
    btn.style.transition='box-shadow .3s';
    let pulse=0;
    const pi=setInterval(()=>{
      if(launched){clearInterval(pi);return;}
      pulse++;
      btn.style.filter=pulse%2===0?'drop-shadow(0 0 12px rgba(255,31,31,.6))':'none';
      if(pulse>=6)clearInterval(pi);
    },600);
  }
},4000);
</script>
